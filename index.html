<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SprintIQ Pro Elite</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:linear-gradient(to bottom,#000,#111);
  color:white;
}
.screen{display:none;padding:20px;}
.active{display:block;}
.header{font-size:28px;font-weight:bold;}
.sub{color:#aaa;margin-bottom:10px;}

.card{
  background:#111;
  padding:16px;
  border-radius:16px;
  margin-top:15px;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#ff2d2d;
  color:white;
  font-weight:bold;
}

#camera{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.controls{
  position:fixed;
  bottom:0;
  width:100%;
  padding:15px;
  background:rgba(0,0,0,0.8);
}

.metric-value{
  font-size:22px;
  font-weight:bold;
}

.history-video{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="home" class="screen active">
  <div class="header">🏃 SprintIQ Elite</div>
  <button class="btn" onclick="showScreen('setup')">Start Run</button>
  <button class="btn" onclick="goToHistory()">History</button>
</div>

<div id="setup" class="screen">
  <div class="header">Select Distance</div>
  <button class="btn" onclick="startRun(100)">100m</button>
  <button class="btn" onclick="startRun(200)">200m</button>
  <button class="btn" onclick="startRun(400)">400m</button>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<div id="live" class="screen">
  <video id="camera" autoplay playsinline muted></video>

  <div class="controls">
    <div id="timer" class="metric-value">0.00s</div>
    <div id="speed" class="metric-value">0 mph</div>
    <div id="splitDisplay">Split: --</div>

    <button class="btn" onclick="beginMovement()">Start</button>
    <button class="btn" onclick="markSplit()">Split</button>
    <button class="btn" onclick="stopRun()">Finish</button>
    <button class="btn" onclick="flipCamera()">Flip Camera</button>
  </div>
</div>

<div id="results" class="screen">
  <div class="header">Results</div>
  <div id="finalTime"></div>
  <div id="finalSpeed"></div>
  <div id="splitsBox"></div>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<div id="history" class="screen">
  <div class="header">History</div>
  <div id="historyList"></div>
  <button class="btn" onclick="clearHistory()">Clear</button>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<script>
let distance = 100;
let startTime = null;
let timer = null;
let splits = [];
let speeds = [];
let currentStream = null;
let useBackCamera = true;
let mediaRecorder = null;
let recordedChunks = [];
let currentUser = "Default";

// NAV
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToHistory(){
  showHistory();
  showScreen('history');
}

// CAMERA + RECORDING
async function startCamera(){
  if(currentStream){
    currentStream.getTracks().forEach(t=>t.stop());
  }

  currentStream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode: useBackCamera ? "environment":"user" },
    audio:false
  });

  document.getElementById("camera").srcObject = currentStream;

  recordedChunks = [];

  if(typeof MediaRecorder !== "undefined"){
    mediaRecorder = new MediaRecorder(currentStream);

    mediaRecorder.ondataavailable = e=>{
      if(e.data.size>0) recordedChunks.push(e.data);
    };

    mediaRecorder.start();
  }
}

function flipCamera(){
  useBackCamera = !useBackCamera;
  startCamera();
}

// RUN
function startRun(d){
  distance = d;
  splits = [];
  speeds = [];

  showScreen('live');
  startCamera();
}

function beginMovement(){
  startTime = Date.now();
  timer = setInterval(update,100);
}

function update(){
  const t = (Date.now()-startTime)/1000;
  document.getElementById("timer").innerText = t.toFixed(2)+"s";

  const speed = (distance/Math.max(t,0.1))*2.237;
  speeds.push(speed);

  document.getElementById("speed").innerText = speed.toFixed(1)+" mph";
}

function markSplit(){
  const t = (Date.now()-startTime)/1000;
  const last = splits.length ? splits[splits.length-1].time : 0;
  const segment = t-last;

  const speed = speeds[speeds.length-1] || 0;

  splits.push({time:t,segmentTime:segment,speed:speed});

  document.getElementById("splitDisplay").innerText =
    `Split ${splits.length}: ${segment.toFixed(2)}s`;
}

function stopRun(){
  clearInterval(timer);

  const t = (Date.now()-startTime)/1000;
  const speed = (distance/t)*2.237;

  document.getElementById("finalTime").innerText = "Time: "+t.toFixed(2);
  document.getElementById("finalSpeed").innerText = "Speed: "+speed.toFixed(2);

  if(mediaRecorder){
    mediaRecorder.onstop = ()=>{
      const blob = new Blob(recordedChunks,{type:"video/webm"});
      const reader = new FileReader();

      reader.onloadend = ()=>{
        saveRun(t,speed,reader.result);
        showSplits();
        showScreen('results');
      };

      reader.readAsDataURL(blob);
    };

    mediaRecorder.stop();
  } else {
    saveRun(t,speed,null);
    showSplits();
    showScreen('results');
  }
}

// SPLITS DISPLAY
function showSplits(){
  let html = "<b>Splits</b><br>";

  splits.forEach((s,i)=>{
    html += `Split ${i+1}: ${s.segmentTime.toFixed(2)}s (${s.speed.toFixed(1)} mph)<br>`;
  });

  document.getElementById("splitsBox").innerHTML = html;
}

// STORAGE
function saveRun(time,speed,video){
  let data = JSON.parse(localStorage.getItem("SprintIQUsers")||"{}");

  if(!data[currentUser]) data[currentUser]=[];

  data[currentUser].push({
    distance,time,speed,splits,video,
    date:new Date().toLocaleString()
  });

  localStorage.setItem("SprintIQUsers",JSON.stringify(data));
}

// HISTORY
function showHistory(){
  const data = JSON.parse(localStorage.getItem("SprintIQUsers")||"{}");
  const runs = data[currentUser]||[];

  let html = `<b>${currentUser} History</b><br><br>`;

  runs.slice().reverse().forEach(r=>{
    html += `
      <div class="card">
        ${r.distance}m - ${r.time.toFixed(2)}s<br>
        ⚡ ${r.speed.toFixed(2)} mph<br>
        ${r.date}
    `;

    if(r.video){
      html += `<video class="history-video" controls src="${r.video}"></video>`;
    }

    html += "</div>";
  });

  document.getElementById("historyList").innerHTML = html;
}

function clearHistory(){
  let data = JSON.parse(localStorage.getItem("SprintIQUsers")||"{}");
  data[currentUser]=[];
  localStorage.setItem("SprintIQUsers",JSON.stringify(data));
  showHistory();
}
</script>

</body>
</html>
