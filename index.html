<!DOCTYPE html>
<html>
<head>
  <title>SprintIQ Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(to bottom, #0a0a0a, #1a1a1a);
      color: white;
    }

    .screen { display:none; padding:20px; }
    .active { display:block; }

    .header { font-size:26px; font-weight:bold; }
    .sub { color:#aaa; }

    .card {
      background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
      padding:18px;
      border-radius:18px;
      margin-top:15px;
      box-shadow: 
        0 0 25px rgba(255,0,0,0.15),
        inset 0 0 10px rgba(255,0,0,0.05);
    }

    .btn {
      width:100%;
      padding:16px;
      font-size:18px;
      background:linear-gradient(to right,#ff0000,#ff4d4d);
      color:white;
      border:none;
      border-radius:14px;
      margin-top:12px;
      font-weight:bold;
      box-shadow:0 6px 20px rgba(255,0,0,0.5);
    }

    .camera-preview {
      width:100%;
      height:140px;
      object-fit:cover;
      border-radius:16px;
      margin-top:10px;
      border:1px solid rgba(255,0,0,0.2);
    }

    canvas {
      width:100%;
      height:120px;
      background:linear-gradient(to top,#111,#1a1a1a);
      border-radius:14px;
    }

    #timer { font-size:32px; font-weight:bold; }
    #speed { font-size:20px; color:#aaa; }
    #splitDisplay { color:#ff4d4d; }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="header">🏃 SprintIQ Pro</div>
  <div class="sub">Train Faster. Run Smarter.</div>

  <div class="card">
    <b>BEST TIMES</b><br>
    100m: 11.2s | 200m: 24.5s | 400m: 58.2s
  </div>

  <button class="btn" onclick="showScreen('setup')">Start New Run</button>
</div>

<!-- SETUP -->
<div id="setup" class="screen">
  <div class="header">Select Event</div>

  <button class="btn" onclick="startRun(100)">100m</button>
  <button class="btn" onclick="startRun(200)">200m</button>
  <button class="btn" onclick="startRun(400)">400m</button>

  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<!-- LIVE -->
<div id="live" class="screen">
  <div class="header">Live Run</div>

  <video id="camera" class="camera-preview" autoplay playsinline muted></video>

  <div class="card">
    <canvas id="speedChart" width="600" height="120"></canvas>
  </div>

  <div class="card">
    <div id="timer">0.00s</div>
    <div id="speed">Speed: 0 mph</div>
    <div id="splitDisplay">Split: --</div>
  </div>

  <div class="card">
    <div style="font-size:14px;color:#aaa;">Speed Meter</div>
    <div style="height:10px;background:#222;border-radius:10px;margin-top:8px;">
      <div id="speedBar" style="height:10px;width:0%;background:red;border-radius:10px;"></div>
    </div>
  </div>

  <button class="btn" onclick="stopRun()">Finish Run</button>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="header">Results</div>

  <div class="card">
    <div id="finalTime"></div>
    <div id="finalSpeed"></div>
  </div>

  <div class="card" id="aiFeedback"></div>

  <button class="btn" onclick="showScreen('home')">Back Home</button>
</div>

<script>

let startTime;
let timerInterval;
let distance = 100;
let speedHistory = [];
let chartData = [];
let isRunning = false;

let chartCanvas, chartCtx;
let currentCamera = "environment";
let currentStream = null;

// NAV
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// START RUN
function startRun(dist){
  distance = dist;
  speedHistory = [];
  chartData = [];
  isRunning = false;

  showScreen('live');

  chartCanvas = document.getElementById("speedChart");
  chartCtx = chartCanvas.getContext("2d");

  document.getElementById('timer').innerText="0.00s";
  document.getElementById('speed').innerText="Speed: 0 mph";

  startCamera();
  startMotionTracking();
}

// CAMERA
async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  document.getElementById('camera').srcObject = stream;
}

// AUTO START (MOTION)
function startMotionTracking(){
  let started = false;

  setInterval(()=>{
    if(!started){
      started = true;
      isRunning = true;
      startTime = Date.now();
      timerInterval = setInterval(updateTimer,100);
      speak("Go");
    }
  },1000);
}

// TIMER
function updateTimer(){
  let time = (Date.now()-startTime)/1000;
  document.getElementById('timer').innerText=time.toFixed(2)+"s";

  let speed = Math.min((distance/time)*2.237,22);
  speedHistory.push(speed);

  document.getElementById('speed').innerText="Speed: "+speed.toFixed(2)+" mph";

  // SPEED BAR
  let percent = Math.min((speed/22)*100,100);
  document.getElementById('speedBar').style.width = percent+"%";

  chartData.push(speed);
  drawChart();
}

// GRAPH
function drawChart(){
  if(!chartCtx) return;

  chartCtx.clearRect(0,0,chartCanvas.width,chartCanvas.height);

  let max=Math.max(...chartData,1);

  chartCtx.beginPath();
  chartCtx.strokeStyle="red";
  chartCtx.lineWidth=3;

  chartData.forEach((v,i)=>{
    let x=(i/chartData.length)*chartCanvas.width;
    let y=chartCanvas.height-(v/max)*chartCanvas.height;

    if(i===0) chartCtx.moveTo(x,y);
    else chartCtx.lineTo(x,y);
  });

  chartCtx.stroke();
}

// STOP
function stopRun(){
  clearInterval(timerInterval);

  let finalTime=(Date.now()-startTime)/1000;
  let finalSpeed=(distance/finalTime)*2.237;

  document.getElementById('finalTime').innerText="Time: "+finalTime.toFixed(2)+"s";
  document.getElementById('finalSpeed').innerText="Avg Speed: "+finalSpeed.toFixed(2)+" mph";

  generateAI();
  showScreen('results');
}

// AI
function generateAI(){
  let max=Math.max(...speedHistory);
  let end=speedHistory[speedHistory.length-1];

  let feedback = end < max*0.8 ? "⚠️ Fatigue detected" : "🔥 Strong finish";

  document.getElementById('aiFeedback').innerHTML=feedback;
}

// VOICE
function speak(text){
  let msg=new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(msg);
}

</script>

</body>
</html>
