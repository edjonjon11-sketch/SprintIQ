<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Star</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:linear-gradient(to bottom,#000,#111);
  color:white;
}
.screen{display:none;padding:20px;}
.active{display:block;}
.header{font-size:28px;font-weight:bold;}
.sub{color:#aaa;margin-bottom:10px;}
.card{
  background:#111;
  padding:16px;
  border-radius:16px;
  margin-top:15px;
}
.btn{
  width:100%;
  padding:16px;
  font-size:18px;
  border:none;
  border-radius:14px;
  margin-top:12px;
  color:white;
  font-weight:bold;
  background:linear-gradient(to right,#ff2d2d,#ff5a5a);
}
.history-video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="home" class="screen active">
  <div class="header">🏃 Track Star</div>
  <button class="btn" onclick="startRun(100)">Start Run</button>
  <button class="btn" onclick="goToHistory()">View History</button>
</div>

<div id="live" class="screen">
  <video id="camera" autoplay playsinline muted style="width:100%;"></video>

  <div class="card">
    <div id="timer">0.00s</div>
    <div id="speed">0 mph</div>
    <div id="splitDisplay">Split: --</div>
  </div>

  <button class="btn" onclick="beginMovement()">Start</button>
  <button class="btn" onclick="markSplit()">Split</button>
  <button class="btn" onclick="stopRun()">Finish</button>
</div>

<div id="results" class="screen">
  <div id="finalTime"></div>
  <div id="finalSpeed"></div>
  <div id="splitsBox"></div>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<div id="history" class="screen">
  <div id="historyList"></div>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<div id="replay" class="screen">
  <video id="replayVideo" controls class="history-video"></video>
  <button class="btn" onclick="goToHistory()">Back</button>
</div>

<script>

let startTime = null;
let timer = null;
let distance = 100;
let splits = [];
let currentUser = "Default";
let mediaRecorder = null;
let recordedChunks = [];
let currentStream = null;

// NAV
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// START RUN
function startRun(d){
  distance = d;
  splits = [];
  showScreen("live");
  startCamera();
}

// CAMERA
async function startCamera(){
  currentStream = await navigator.mediaDevices.getUserMedia({video:true});
  document.getElementById("camera").srcObject = currentStream;

  recordedChunks = [];

  mediaRecorder = new MediaRecorder(currentStream);
  mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
  mediaRecorder.start();
}

// START TIMER
function beginMovement(){
  startTime = Date.now();
  timer = setInterval(update,100);
}

// UPDATE
function update(){
  const t = (Date.now()-startTime)/1000;
  document.getElementById("timer").innerText = t.toFixed(2)+"s";

  const speed = (distance/t)*2.237;
  document.getElementById("speed").innerText = speed.toFixed(1)+" mph";
}

// SPLIT
function markSplit(){
  const t = (Date.now()-startTime)/1000;

  const prev = splits.length ? splits[splits.length-1].time : 0;
  const seg = t - prev;

  splits.push({time:t,segmentTime:seg,speed:(distance/4/seg)*2.237});

  document.getElementById("splitDisplay").innerText =
    "Split "+splits.length+": "+seg.toFixed(2)+"s";
}

// STOP
function stopRun(){

  clearInterval(timer);

  const t = (Date.now()-startTime)/1000;
  const speed = (distance/t)*2.237;

  document.getElementById("finalTime").innerText = "Time: "+t.toFixed(2);
  document.getElementById("finalSpeed").innerText = "Speed: "+speed.toFixed(2);

  mediaRecorder.onstop = function(){
    const blob = new Blob(recordedChunks);
    const reader = new FileReader();

    reader.onloadend = function(){
      saveRun(t,speed,reader.result);
      showHistory();
      showScreen("results");
    };

    reader.readAsDataURL(blob);
  };

  mediaRecorder.stop();
}

// SAVE
function saveRun(time,speed,video){
  const data = JSON.parse(localStorage.getItem("SprintIQUsers")||"{}");

  if(!data[currentUser]) data[currentUser]=[];

  data[currentUser].push({
    distance,time,speed,splits,video,date:new Date().toLocaleString()
  });

  localStorage.setItem("SprintIQUsers",JSON.stringify(data));
}

// HISTORY
function goToHistory(){
  showScreen("history");
  showHistory();
}

function showHistory(){

  const data = JSON.parse(localStorage.getItem("SprintIQUsers")||"{}");
  const runs = data[currentUser]||[];

  let html = "";

  runs.slice().reverse().forEach((r,i)=>{

    html += `
    <div class="card">
      ${r.distance}m - ${r.time.toFixed(2)}s<br>
      ${r.speed.toFixed(2)} mph<br>
      ${r.date}
      <button class="btn" onclick="openReplay(${runs.length-1-i})">Replay</button>
      <video class="history-video" src="${r.video}" controls></video>
    </div>`;
  });

  document.getElementById("historyList").innerHTML = html || "No runs";
}

// REPLAY
function openReplay(i){
  const data = JSON.parse(localStorage.getItem("SprintIQUsers")||"{}");
  const run = data[currentUser][i];

  const v = document.getElementById("replayVideo");
  v.src = run.video;
  v.load();

  showScreen("replay");
}

</script>

</body>
</html>
