<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SprintIQ Pro</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:linear-gradient(to bottom,#000,#111);
  color:white;
}
.screen{display:none;padding:20px;}
.active{display:block;}
.header{font-size:28px;font-weight:bold;}
.card{background:#111;padding:16px;border-radius:16px;margin-top:15px;}
.btn{
  width:100%;padding:14px;margin-top:10px;
  border:none;border-radius:12px;
  background:#ff2d2d;color:white;font-weight:bold;
}
#camera{
  position:fixed;top:0;left:0;width:100%;height:100vh;object-fit:cover;
}
.controls{
  position:fixed;bottom:0;width:100%;padding:15px;
  background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}
.history-video{width:100%;margin-top:10px;border-radius:10px;}
</style>
</head>

<body>

<div id="home" class="screen active">
  <div class="header">🏃 SprintIQ Pro</div>
  <button class="btn" onclick="startRun(100)">Start Run</button>
  <button class="btn" onclick="goToHistory()">History</button>
</div>

<div id="live" class="screen">
  <video id="camera" autoplay playsinline muted></video>

  <div class="controls">
    <div id="timer">0.00s</div>
    <div id="speed">0 mph</div>
    <div id="splitDisplay">Split: --</div>

    <button class="btn" onclick="beginMovement()">Start</button>
    <button class="btn" onclick="markSplit()">Split</button>
    <button class="btn" onclick="stopRun()">Finish</button>
    <button class="btn" onclick="flipCamera()">Flip Camera</button>
  </div>
</div>

<div id="results" class="screen">
  <div id="finalTime"></div>
  <div id="finalSpeed"></div>
  <div id="splitsBox"></div>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<div id="history" class="screen">
  <div id="historyList"></div>
  <button class="btn" onclick="clearHistory()">Clear</button>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<div id="replay" class="screen">
  <div id="replayTitle"></div>
  <video id="replayVideo" class="history-video" controls></video>
  <button class="btn" onclick="goToHistory()">Back</button>
</div>

<script>
let useBackCamera=true;
let currentUser="Default";
let startTime=null;
let timer=null;
let distance=100;
let splits=[];
let speeds=[];
let isRunning=false;
let currentStream=null;

// 🎥 RECORDING
let mediaRecorder=null;
let recordedChunks=[];

// NAV
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// CAMERA + RECORD
async function startCamera(){
  if(currentStream){
    currentStream.getTracks().forEach(t=>t.stop());
  }

  currentStream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:useBackCamera?"environment":"user"},
    audio:false
  });

  const video = document.getElementById('camera');
  video.srcObject=currentStream;

  recordedChunks=[];

  if(typeof MediaRecorder !== "undefined"){
    mediaRecorder = new MediaRecorder(currentStream);

    mediaRecorder.ondataavailable = e=>{
      if(e.data.size>0) recordedChunks.push(e.data);
    };

    mediaRecorder.start();
  }
}

function flipCamera(){
  useBackCamera=!useBackCamera;
  startCamera();
}

// RUN
function startRun(d){
  distance=d;
  splits=[];
  speeds=[];
  startTime=null;
  showScreen('live');
  startCamera();
}

function beginMovement(){
  if(isRunning) return;
  isRunning=true;
  startTime=Date.now();
  timer=setInterval(update,100);
}

function update(){
  const t=(Date.now()-startTime)/1000;
  document.getElementById('timer').innerText=t.toFixed(2)+"s";

  const speed=(distance/t)*2.237;
  speeds.push(speed);

  document.getElementById('speed').innerText=speed.toFixed(1)+" mph";
}

function markSplit(){
  const t=(Date.now()-startTime)/1000;
  const speed=speeds[speeds.length-1]||0;

  splits.push({time:t,speed:speed});

  document.getElementById('splitDisplay').innerText=
    `Split ${splits.length}: ${t.toFixed(2)}s | ${speed.toFixed(1)} mph`;
}

// STOP + SAVE VIDEO
function stopRun(){
  clearInterval(timer);

  const t=(Date.now()-startTime)/1000;
  const speed=(distance/t)*2.237;

  document.getElementById('finalTime').innerText="Time: "+t.toFixed(2);
  document.getElementById('finalSpeed').innerText="Speed: "+speed.toFixed(2);

  const finish = (videoData)=>{
    saveRun(t,speed,videoData);
    showSplits();
    showScreen('results');
  };

  if(mediaRecorder && mediaRecorder.state!=="inactive"){

    mediaRecorder.onstop = function(){
      const blob = new Blob(recordedChunks,{type:"video/webm"});

      const reader = new FileReader();
      reader.onloadend = ()=>{
        finish(reader.result); // BASE64 SAVE
      };
      reader.readAsDataURL(blob);
    };

    mediaRecorder.stop();

  } else {
    finish(null);
  }

  isRunning=false;
}

// SPLITS
function showSplits(){
  let html="<b>Splits</b><br>";
  splits.forEach((s,i)=>{
    html+=`Split ${i+1}: ${s.time.toFixed(2)}s | ${s.speed.toFixed(1)} mph<br>`;
  });
  document.getElementById('splitsBox').innerHTML=html;
}

// STORAGE
function saveRun(time,speed,video){
  const data=JSON.parse(localStorage.getItem("SprintIQUsers")||"{}");

  if(!data[currentUser]) data[currentUser]=[];

  data[currentUser].push({
    distance,time,speed,splits,video,
    date:new Date().toLocaleString()
  });

  localStorage.setItem("SprintIQUsers",JSON.stringify(data));
}

// HISTORY
function showHistory(){
  const data=JSON.parse(localStorage.getItem("SprintIQUsers")||"{}");
  const runs=data[currentUser]||[];

  let html=`<b>${currentUser} History</b><br><br>`;

  runs.slice().reverse().forEach((r,i)=>{
    html+=`
      <div style="margin-bottom:15px;">
        ${r.distance}m - ${r.time.toFixed(2)}s (${r.speed.toFixed(2)} mph)<br>
        ${r.date}<br>
        <button onclick="openReplay(${runs.length-1-i})">Replay</button>
      </div>
    `;
  });

  document.getElementById("historyList").innerHTML=html;
}

function openReplay(index){
  const data=JSON.parse(localStorage.getItem("SprintIQUsers")||"{}");
  const run=data[currentUser][index];

  if(!run.video){
    alert("No video saved");
    return;
  }

  document.getElementById("replayTitle").innerText=
    `${run.distance}m - ${run.time.toFixed(2)}s`;

  const video=document.getElementById("replayVideo");
  video.src=run.video;

  showScreen("replay");
}

function clearHistory(){
  const data=JSON.parse(localStorage.getItem("SprintIQUsers")||"{}");
  data[currentUser]=[];
  localStorage.setItem("SprintIQUsers",JSON.stringify(data));
  showHistory();
}

function goToHistory(){
  showHistory();
  showScreen('history');
}
</script>

</body>
</html>
