<script>
let startTime;
let timerInterval;
let distance = 100;
let speedHistory = [];
let splits = [];
let isRunning = false;
let currentCamera = "environment"; // back camera

  let chartCanvas;
let chartCtx;
let chartData = [];
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startRun(dist) {
  distance = dist;
  speedHistory = [];
  splits = [];
  isRunning = false;

  showScreen('live');
  startCamera();
  startMotionTracking();
  chartCanvas = document.getElementById("speedChart");
chartCtx = chartCanvas.getContext("2d");
chartData = [];

  document.getElementById('timer').innerText = "0.00s";
  document.getElementById('speed').innerText = "Speed: 0 mph";
}

function startCamera() {
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: currentCamera }
  }).then(stream => {
    document.getElementById('camera').srcObject = stream;
  });
}

// 🔄 Switch Camera
function switchCamera() {
  currentCamera = currentCamera === "environment" ? "user" : "environment";
  startCamera();
}

// ▶️ Start actual timing
function beginMovement() {
  if (!isRunning) {
    isRunning = true;
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 100);
  }
}

function updateTimer() {
  let time = (Date.now() - startTime) / 1000;
  document.getElementById('timer').innerText = time.toFixed(2) + "s";

  // More realistic speed cap
  let speed = Math.min((distance / time) * 2.237, 22);
  speedHistory.push(speed);

  document.getElementById('speed').innerText =
    "Speed: " + speed.toFixed(2) + " mph";
  chartData.push(speed);
drawChart();
}

// 👆 Manual split
function markSplit() {
  let time = (Date.now() - startTime) / 1000;
  splits.push(time);

  document.getElementById('splitDisplay').innerText =
    "Split " + splits.length + ": " + time.toFixed(2) + "s";
}

function stopRun() {
  clearInterval(timerInterval);

  let finalTime = (Date.now() - startTime) / 1000;
  let finalSpeed = (distance / finalTime) * 2.237;

  document.getElementById('finalTime').innerText =
    "Time: " + finalTime.toFixed(2) + "s";

  document.getElementById('finalSpeed').innerText =
    "Avg Speed: " + finalSpeed.toFixed(2) + " mph";

  displaySplits();
  generateAI();

  showScreen('results');
}

function displaySplits() {
  let html = "<b>Splits:</b><br>";
  splits.forEach((s, i) => {
    html += "Split " + (i+1) + ": " + s.toFixed(2) + "s<br>";
  });
  document.getElementById('splitsBox').innerHTML = html;
}

function generateAI() {
  let feedback = "";
  let maxSpeed = Math.max(...speedHistory);
  let endSpeed = speedHistory[speedHistory.length - 1];

  if (endSpeed < maxSpeed * 0.8) {
    feedback += "⚠️ Fatigue detected — improve endurance.<br>";
  } else {
    feedback += "🔥 Strong finish.<br>";
  }

  document.getElementById('aiFeedback').innerHTML = feedback;
}

let lastFrameData = null;
let motionThreshold = 20;
let splitZones = [0.25, 0.5, 0.75, 1.0];
let zoneTriggered = [];

function startMotionTracking() {
  const video = document.getElementById('camera');
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  setInterval(() => {
    if (!video.videoWidth) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);
    let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

    if (lastFrameData) {
      let motion = detectMotion(frame.data, lastFrameData.data);

      if (motion > motionThreshold) {
        detectSplitZones(motion);
      }
    }

    lastFrameData = frame;
  }, 200);
}

function detectMotion(current, previous) {
  let diff = 0;

  for (let i = 0; i < current.length; i += 4) {
    let d = Math.abs(current[i] - previous[i]);
    if (d > 30) diff++;
  }

  return diff;
}

function detectSplitZones(motion) {
  let time = (Date.now() - startTime) / 1000;

  splitZones.forEach((zone, i) => {
    if (!zoneTriggered[i]) {
      if (motion > motionThreshold && time > (zone * distance / 2)) {
  splits[i] = time;
  zoneTriggered[i] = true;

  document.getElementById('splitDisplay').innerText =
    "Auto Split " + (i+1) + ": " + time.toFixed(2) + "s";
}
      }
    }
  });
}
