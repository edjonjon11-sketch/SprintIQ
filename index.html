<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

// 🔥 GLOBAL ERROR HANDLER
window.onerror = function(msg, url, line){
  console.error("ERROR:", msg, "Line:", line);
};

// 🔥 SAFE SUPABASE INIT (NO CRASH)
let supabase = null;

if(window.supabase){
  try{
    supabase = window.supabase.createClient(
      "YOUR_SUPABASE_URL",
      "YOUR_SUPABASE_ANON_KEY"
    );
  }catch(e){
    console.warn("Supabase not connected");
  }
}

// 🔥 STATE
let useBackCamera = true;
let currentStream = null;
let mediaRecorder = null;
let recordedChunks = [];

let currentUser = localStorage.getItem("currentUser") || "Default";

let startTime = null;
let timer = null;
let distance = 100;
let splits = [];
let speeds = [];
let chartData = [];
let isRunning = false;
let selectedLane = 1;
let zoomLevel = 1;

// ---------------- NAV ----------------
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if(el) el.classList.add('active');
}

// ---------------- USER ----------------
function updateActiveUserUI(){
  const liveUserText = document.getElementById("liveUserText");
  const liveUser = document.getElementById("liveUser");
  const resultsUser = document.getElementById("resultsUser");

  if(liveUserText) liveUserText.innerText = currentUser;
  if(liveUser) liveUser.innerText = "🏃 Runner: " + currentUser;
  if(resultsUser) resultsUser.innerText = "🏁 Athlete: " + currentUser;
}

// ---------------- LOGIN ----------------
async function quickLogin(){
  if(!supabase){
    alert("Supabase not connected");
    return;
  }

  let email = prompt("Email:");
  let password = prompt("Password:");

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if(error) alert("Login failed");
  else alert("Logged in");
}

// ---------------- START RUN ----------------
function startRun(d){
  distance = d;
  splits = [];
  speeds = [];
  chartData = [];
  isRunning = false;
  startTime = null;

  clearInterval(timer);

  document.getElementById('timer').innerText = "0.00s";
  document.getElementById('speed').innerText = "0 mph";
  document.getElementById('splitDisplay').innerText = "Split: --";

  updateActiveUserUI();
  showScreen('live');

  startCamera();
}

// ---------------- CAMERA ----------------
async function startCamera(){
  try{
    if(currentStream){
      currentStream.getTracks().forEach(t=>t.stop());
    }

    currentStream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode: useBackCamera ? "environment":"user" },
      audio:false
    });

    const video = document.getElementById("camera");

    if(video){
      video.srcObject = currentStream;
      video.onloadedmetadata = () => video.play().catch(()=>{});
    }

    recordedChunks = [];

    if(window.MediaRecorder){
      mediaRecorder = new MediaRecorder(currentStream);

      mediaRecorder.ondataavailable = e=>{
        if(e.data.size > 0) recordedChunks.push(e.data);
      };

      mediaRecorder.start();
    }

  }catch(err){
    console.error(err);
    alert("Camera blocked or failed");
  }
}

// ---------------- CAMERA FLIP ----------------
function flipCamera(){
  useBackCamera = !useBackCamera;
  startCamera();
}

// ---------------- RUN ----------------
function beginMovement(){
  if(isRunning) return;

  isRunning = true;
  startTime = Date.now();

  timer = setInterval(update,100);
}

function update(){
  if(!isRunning || !startTime) return;

  const t = (Date.now() - startTime)/1000;
  document.getElementById('timer').innerText = t.toFixed(2)+"s";

  const speed = (distance/Math.max(t,0.1))*2.237;

  speeds.push(speed);
  chartData.push(speed);

  document.getElementById('speed').innerText = speed.toFixed(1)+" mph";
  document.getElementById('speedFill').style.width = (speed/22*100)+"%";

  drawSpeedChart();
}

function markSplit(){
  if(!isRunning || !startTime) return;

  const t = (Date.now()-startTime)/1000;
  const prev = splits.length ? splits[splits.length-1].time : 0;
  const seg = t - prev;

  const speed = (distance/4)/Math.max(seg,0.1)*2.237;

  splits.push({time:t,segmentTime:seg,speed});

  document.getElementById("splitDisplay").innerText =
    `Split ${splits.length}: ${seg.toFixed(2)}s`;
}

// ---------------- STOP RUN ----------------
async function stopRun(){

  clearInterval(timer);

  if(!startTime) return;

  const t = (Date.now()-startTime)/1000;
  const speed = (distance/Math.max(t,0.1))*2.237;

  document.getElementById('finalTime').innerText = "Time: "+t.toFixed(2);
  document.getElementById('finalSpeed').innerText = "Speed: "+speed.toFixed(2);

  let videoURL = null;

  try{
    if(mediaRecorder && mediaRecorder.state !== "inactive"){

      const stopPromise = new Promise(resolve=>{
        mediaRecorder.onstop = resolve;
      });

      mediaRecorder.stop();
      await stopPromise;

      const blob = new Blob(recordedChunks,{type:"video/webm"});

      if(blob.size > 0 && supabase){
        videoURL = await uploadVideo(blob);
      }
    }
  }catch(e){
    console.error("Video fail:", e);
  }

  if(supabase){
    await saveRunToCloud(t,speed,videoURL);
  }

  showSplits();
  showScreen("results");

  if(currentStream){
    currentStream.getTracks().forEach(t=>t.stop());
  }

  isRunning = false;
}

// ---------------- SAVE ----------------
async function uploadVideo(blob){
  if(!supabase) return null;

  const fileName = "run_"+Date.now()+".webm";

  const { error } = await supabase.storage
    .from("videos")
    .upload(fileName, blob);

  if(error){
    console.error(error);
    return null;
  }

  return supabase.storage
    .from("videos")
    .getPublicUrl(fileName).data.publicUrl;
}

async function saveRunToCloud(time,speed,videoURL){
  if(!supabase) return;

  const { data:{user} } = await supabase.auth.getUser();
  if(!user) return;

  await supabase.from("runs").insert([{
    user_id:user.id,
    distance,
    time,
    speed,
    video_url:videoURL,
    date:new Date()
  }]);
}

// ---------------- UI ----------------
function showSplits(){
  let html="<b>Splits</b><br>";

  if(splits.length === 0){
    html += "No splits";
  } else {
    splits.forEach((s,i)=>{
      html+=`Split ${i+1}: ${s.segmentTime.toFixed(2)}s (${s.speed.toFixed(1)} mph)<br>`;
    });
  }

  document.getElementById("splitsBox").innerHTML = html;
}

// ---------------- HISTORY ----------------
async function showHistory(){

  if(!supabase){
    document.getElementById("historyList").innerHTML="Supabase not connected";
    return;
  }

  const { data:{user} } = await supabase.auth.getUser();

  if(!user){
    document.getElementById("historyList").innerHTML="Login first";
    return;
  }

  const { data } = await supabase
    .from("runs")
    .select("*")
    .eq("user_id",user.id)
    .order("date",{ascending:false});

  let html="";
  data.forEach(r=>{
    html+=`
      <div class="card">
        ${r.distance}m - ${Number(r.time).toFixed(2)}s<br>
        ⚡ ${Number(r.speed).toFixed(2)} mph<br>
        ${new Date(r.date).toLocaleString()}
        ${r.video_url ? `<video controls class="history-video" src="${r.video_url}"></video>` : ""}
      </div>
    `;
  });

  document.getElementById("historyList").innerHTML = html;
}

function goToHistory(){
  showScreen("history");
  showHistory();
}

// ---------------- CHART ----------------
function drawSpeedChart(){
  const c=document.getElementById("speedChart");
  if(!c) return;

  const ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  if(chartData.length<2) return;

  const max=Math.max(...chartData,1);

  ctx.beginPath();
  ctx.strokeStyle="#ff3b30";
  ctx.lineWidth=3;

  chartData.forEach((v,i)=>{
    const x=(i/chartData.length)*c.width;
    const y=c.height-(v/max)*(c.height-10);
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.stroke();
}

// INIT
updateActiveUserUI();

</script>
