<script>
let currentUser = localStorage.getItem("currentUser") || "Default";
let startTime = null;
let timer = null;
let distance = 100;
let splits = [];
let speeds = [];
let chartData = [];
let isRunning = false;
let currentStream = null;

// LAP TRACKING
let lapDistance = 400;
let totalLaps = 1;
let currentLap = 0;

// =========================
// USER LABEL
// =========================
function updateActiveUserUI(){
  const live = document.getElementById("liveUser");
  const results = document.getElementById("resultsUser");

  if(live){
    live.innerText = "🏃 Runner: " + currentUser;
  }

  if(results){
    results.innerText = "🏁 Athlete: " + currentUser;
  }
}

// =========================
// NAVIGATION
// =========================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToHistory(){
  showHistory();
  showScreen('history');
}

// =========================
// RUNNER SELECTION
// =========================
function selectRunner(){
  const savedUsers = JSON.parse(localStorage.getItem("SprintIQUserList") || "[]");

  const list = savedUsers.length
    ? "Select runner:\n\n" + savedUsers.map((u,i)=>`${i+1}. ${u}`).join("\n") + "\n\nOr type new name:"
    : "Enter runner name:";

  let input = prompt(list);
  if(!input) return null;

  input = input.trim();

  const index = parseInt(input, 10);
  if(!isNaN(index) && savedUsers[index - 1]){
    currentUser = savedUsers[index - 1];
  } else {
    currentUser = input;

    if(!savedUsers.includes(currentUser)){
      savedUsers.push(currentUser);
      localStorage.setItem("SprintIQUserList", JSON.stringify(savedUsers));
    }
  }

  localStorage.setItem("currentUser", currentUser);
  return currentUser;
}

// =========================
// RUN SETUP
// =========================
function startRun(d){
  const user = selectRunner();
  if(!user) return;

  currentUser = user;
  distance = d;
  splits = [];
  speeds = [];
  chartData = [];

  totalLaps = Math.max(1, Math.round(distance / 400));
  currentLap = 0;

  isRunning = false;
  startTime = null;

  if(timer) clearInterval(timer);
  timer = null;

  document.getElementById('timer').innerText = "0.00s";
  document.getElementById('speed').innerText = "Speed: 0 mph";
  document.getElementById('splitDisplay').innerText = "Split: --";
  document.getElementById('speedFill').style.width = "0%";

  drawChart();
  updateActiveUserUI();
  showScreen('live');
  startCamera();
}

// =========================
// CAMERA
// =========================
async function startCamera(){
  try{
    if(currentStream){
      currentStream.getTracks().forEach(track => track.stop());
    }

    currentStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" }
      },
      audio: false
    });

    document.getElementById('camera').srcObject = currentStream;

  } catch(err){
    try {
      currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      document.getElementById('camera').srcObject = currentStream;
    } catch(err2){
      console.error(err2);
      alert("Camera access failed. Please allow camera permission.");
    }
  }
}

// =========================
// RUN CONTROL
// =========================
function beginMovement(){
  if(isRunning) return;

  isRunning = true;
  startTime = Date.now();

  if(timer) clearInterval(timer);
  timer = setInterval(update, 100);
}

function update(){
  if(!isRunning || !startTime) return;

  const t = (Date.now() - startTime) / 1000;
  document.getElementById('timer').innerText = t.toFixed(2) + "s";

  const speed = Math.min((distance / Math.max(t, 0.1)) * 2.237, 22);
  speeds.push(speed);

  document.getElementById('speed').innerText = "Speed: " + speed.toFixed(1) + " mph";
  document.getElementById('speedFill').style.width = (speed / 22 * 100) + "%";

  chartData.push(speed);
  drawChart();

  // AUTO LAP
  const progress = t / (distance / 10);
  const estimatedDistance = progress * distance;
  const lapIndex = Math.floor(estimatedDistance / lapDistance);

  if (lapIndex > currentLap && lapIndex < totalLaps) {
    currentLap = lapIndex;

    const splitSpeed = speeds[speeds.length - 1] || 0;

    splits.push({
      time: t,
      speed: splitSpeed,
      lap: currentLap
    });

    document.getElementById('splitDisplay').innerText =
      `Lap ${currentLap}: ${t.toFixed(2)}s | ${splitSpeed.toFixed(1)} mph`;
  }
}

function markSplit(){
  if(!isRunning) return;

  const t = (Date.now() - startTime) / 1000;
  const speed = speeds[speeds.length - 1] || 0;

  currentLap++;

  splits.push({
    time: t,
    speed: speed,
    lap: currentLap
  });

  document.getElementById('splitDisplay').innerText =
    `Lap ${currentLap}: ${t.toFixed(2)}s | ${speed.toFixed(1)} mph`;
}

function resetRun(){
  if(timer) clearInterval(timer);

  isRunning = false;
  startTime = null;
  splits = [];
  speeds = [];
  chartData = [];
  currentLap = 0;

  document.getElementById('timer').innerText = "0.00s";
  document.getElementById('speed').innerText = "Speed: 0 mph";
  document.getElementById('splitDisplay').innerText = "Split: --";
  document.getElementById('speedFill').style.width = "0%";

  drawChart();
}

function stopRun(){
  if(timer) clearInterval(timer);

  isRunning = false;

  const t = startTime ? (Date.now() - startTime) / 1000 : 0;
  const speed = t > 0 ? (distance / t) * 2.237 : 0;

  document.getElementById('finalTime').innerText = "Time: " + t.toFixed(2) + "s";
  document.getElementById('finalSpeed').innerText = "Speed: " + speed.toFixed(2) + " mph";

  showSplits();
  saveRunToHistory(t, speed);
  updateActiveUserUI();
  showScreen('results');
}

// =========================
// SPLITS
// =========================
function showSplits(){
  let html = "<b>Splits</b><br>";

  if(splits.length === 0){
    html += "No splits recorded";
  } else {
    splits.forEach((s, i) => {
      html += `Lap ${i + 1}: ${s.time.toFixed(2)}s | ${s.speed.toFixed(1)} mph<br>`;
    });
  }

  document.getElementById('splitsBox').innerHTML = html;
}

// =========================
// HISTORY
// =========================
function saveRunToHistory(time, speed){
  const allData = JSON.parse(localStorage.getItem("SprintIQUsers") || "{}");

  if(!allData[currentUser]){
    allData[currentUser] = [];
  }

  allData[currentUser].push({
    distance: distance,
    time: time,
    speed: speed,
    date: new Date().toLocaleString()
  });

  localStorage.setItem("SprintIQUsers", JSON.stringify(allData));
}

function showHistory(){
  const allData = JSON.parse(localStorage.getItem("SprintIQUsers") || "{}");
  const userRuns = allData[currentUser] || [];

  let html = `<b>${currentUser} Performance</b><br><br>`;

  if(userRuns.length === 0){
    html += "No runs yet";
  } else {
    userRuns.slice().reverse().forEach(run => {
      const pace = (run.time / run.distance * 100).toFixed(2);

      html += `
        <div style="
          background:#111;
          padding:12px;
          border-radius:12px;
          margin-bottom:10px;
          box-shadow:0 0 10px rgba(255,0,0,.2);
        ">
          <div style="font-size:18px;font-weight:bold;">
            ${run.distance}m - ${Number(run.time).toFixed(2)}s
          </div>

          <div style="color:#aaa;margin-top:4px;">
            ⚡ ${Number(run.speed).toFixed(2)} mph | 🧠 ${pace}s/100m
          </div>

          <div style="font-size:12px;color:#666;margin-top:6px;">
            ${run.date}
          </div>
        </div>
      `;
    });
  }

  document.getElementById("historyList").innerHTML = html;
}

function clearHistory(){
  const confirmClear = confirm("Clear all history for " + currentUser + "?");
  if(!confirmClear) return;

  const allData = JSON.parse(localStorage.getItem("SprintIQUsers") || "{}");

  if(!allData[currentUser]){
    alert("No history to clear.");
    return;
  }

  allData[currentUser] = [];
  localStorage.setItem("SprintIQUsers", JSON.stringify(allData));
  showHistory();
  alert("History cleared for " + currentUser);
}

// =========================
// USER SWITCH
// =========================
function switchUser(){
  const name = prompt("Enter athlete name:");
  if(!name || name.trim() === "") return;

  currentUser = name.trim();
  localStorage.setItem("currentUser", currentUser);
  updateActiveUserUI();
}

// =========================
// CHART
// =========================
function drawChart(){
  const c = document.getElementById('chart');
  const ctx = c.getContext('2d');

  ctx.clearRect(0, 0, c.width, c.height);

  const max = Math.max(...chartData, 1);

  ctx.beginPath();
  ctx.strokeStyle = "red";
  ctx.lineWidth = 3;

  chartData.forEach((v, i) => {
    const x = i * 3;
    const y = c.height - (v / max * c.height);

    if(i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.stroke();
}

// INIT
updateActiveUserUI();
</script>
