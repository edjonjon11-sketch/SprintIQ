<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Star Elite</title>

<style>
:root{
  --bg:#050505;
  --panel:#121212;
  --text:#fff;
  --muted:#aaa;
  --accent:#ff3b30;
  --accent2:#ff6b60;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(#000,#111);
  color:white;
}

.screen{display:none;padding:20px;}
.active{display:block;}

.header{font-size:28px;font-weight:800;}
.card{
  background:#111;
  padding:15px;
  border-radius:14px;
  margin-top:10px;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:linear-gradient(to right,var(--accent),var(--accent2));
  color:white;
  font-weight:bold;
}

#camera{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.controls{
  position:fixed;
  bottom:0;
  width:100%;
  padding:15px;
  background:rgba(0,0,0,0.9);
}

.metric{font-size:22px;font-weight:bold;}

.history-video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="home" class="screen active">
  <div class="header">🏃 Track Star Elite</div>
  <button class="btn" onclick="showScreen('setup')">Start Run</button>
  <button class="btn" onclick="goToHistory()">History</button>
</div>

<div id="setup" class="screen">
  <div class="header">Select Distance</div>
  <button class="btn" onclick="startRun(100)">100m</button>
  <button class="btn" onclick="startRun(200)">200m</button>
  <button class="btn" onclick="startRun(400)">400m</button>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<div id="live" class="screen">
  <video id="camera" autoplay playsinline muted></video>

  <div class="controls">
    <div id="timer" class="metric">0.00s</div>
    <div id="speed" class="metric">0 mph</div>
    <div id="splitDisplay">Split: --</div>

    <button class="btn" onclick="beginMovement()">Start</button>
    <button class="btn" onclick="markSplit()">Split</button>
    <button class="btn" onclick="stopRun()">Finish</button>
    <button class="btn" onclick="flipCamera()">Flip Camera</button>
  </div>
</div>

<div id="results" class="screen">
  <div class="header">Results</div>
  <div id="finalTime"></div>
  <div id="finalSpeed"></div>
  <div id="splitsBox"></div>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<div id="history" class="screen">
  <div class="header">History</div>
  <div id="historyList"></div>
  <button class="btn" onclick="clearHistory()">Clear</button>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<script>
let distance=100,startTime,timer,splits=[],speeds=[];
let stream,useBackCamera=true,mediaRecorder,chunks=[];

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToHistory(){
  showHistory();
  showScreen('history');
}

async function startCamera(){
  if(stream) stream.getTracks().forEach(t=>t.stop());

  stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:useBackCamera?"environment":"user"},
    audio:false
  });

  document.getElementById("camera").srcObject=stream;

  chunks=[];

  if(MediaRecorder){
    mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>{
      if(e.data.size>0) chunks.push(e.data);
    };
    mediaRecorder.start();
  }
}

function flipCamera(){
  useBackCamera=!useBackCamera;
  startCamera();
}

function startRun(d){
  distance=d;
  splits=[];
  speeds=[];
  showScreen('live');
  startCamera();
}

function beginMovement(){
  startTime=Date.now();
  timer=setInterval(update,100);
}

function update(){
  let t=(Date.now()-startTime)/1000;
  document.getElementById("timer").innerText=t.toFixed(2)+"s";

  let speed=(distance/Math.max(t,0.1))*2.237;
  speeds.push(speed);
  document.getElementById("speed").innerText=speed.toFixed(1)+" mph";
}

function markSplit(){
  let t=(Date.now()-startTime)/1000;
  let prev=splits.length?splits[splits.length-1].time:0;
  let seg=t-prev;

  let speed=speeds[speeds.length-1]||0;

  splits.push({time:t,segmentTime:seg,speed});

  document.getElementById("splitDisplay").innerText=
    `Split ${splits.length}: ${seg.toFixed(2)}s`;
}

function stopRun(){
  clearInterval(timer);

  let t=(Date.now()-startTime)/1000;
  let speed=(distance/t)*2.237;

  document.getElementById("finalTime").innerText="Time: "+t.toFixed(2);
  document.getElementById("finalSpeed").innerText="Speed: "+speed.toFixed(2);

  if(mediaRecorder){
    mediaRecorder.onstop=()=>{
      let blob=new Blob(chunks,{type:"video/webm"});
      let reader=new FileReader();
      reader.onloadend=()=>{
        saveRun(t,speed,reader.result);
        showSplits();
        showScreen('results');
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.stop();
  }
}

function showSplits(){
  let html="<b>Splits</b><br>";
  splits.forEach((s,i)=>{
    html+=`Split ${i+1}: ${s.segmentTime.toFixed(2)}s (${s.speed.toFixed(1)} mph)<br>`;
  });
  document.getElementById("splitsBox").innerHTML=html;
}

function saveRun(time,speed,video){
  let data=JSON.parse(localStorage.getItem("runs")||"[]");
  data.push({distance,time,speed,splits,video,date:new Date().toLocaleString()});
  localStorage.setItem("runs",JSON.stringify(data));
}

function showHistory(){
  let data=JSON.parse(localStorage.getItem("runs")||"[]");

  let html="";
  data.slice().reverse().forEach(r=>{
    html+=`
      <div class="card">
        ${r.distance}m - ${r.time.toFixed(2)}s<br>
        ⚡ ${r.speed.toFixed(2)} mph<br>
        ${r.date}
    `;

    if(r.video){
      html+=`<video class="history-video" controls src="${r.video}"></video>`;
    }

    html+="</div>";
  });

  document.getElementById("historyList").innerHTML=html;
}

function clearHistory(){
  localStorage.removeItem("runs");
  showHistory();
}
</script>

</body>
</html>
