<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8" />
  <title>Track Star</title>

  <style>
    body{
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, sans-serif;
      background:linear-gradient(to bottom,#000,#111);
      color:white;
    }

    .screen{display:none;padding:20px;}
    .active{display:block;}

    .header{font-size:28px;font-weight:bold;}
    .sub{color:#aaa;margin-bottom:10px;}

    .card{
      background:#111;
      padding:16px;
      border-radius:16px;
      margin-top:15px;
      box-shadow:0 0 20px rgba(255,0,0,.2);
    }

    .btn{
      width:100%;
      padding:16px;
      font-size:18px;
      border:none;
      border-radius:14px;
      margin-top:12px;
      color:white;
      font-weight:bold;
      background:linear-gradient(to right,#ff2d2d,#ff5a5a);
    }

    #camera{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100vh;
      object-fit:cover;
      z-index:1;
      filter:contrast(1.1) brightness(1.1) saturate(1.1);
      background:#000;
    }

    #laneOverlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100vh;
      z-index:2;
      pointer-events:none;
    }

    .controls{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      padding:15px;
      z-index:3;
      box-sizing:border-box;
      background:linear-gradient(
        to top,
        rgba(0,0,0,0.92),
        rgba(0,0,0,0.05)
      );
    }

    .subtle-label{
      font-size:12px;
      color:#aaa;
      letter-spacing:0.08em;
      text-transform:uppercase;
    }

    .metric-row{
      display:flex;
      gap:10px;
      margin-top:10px;
    }

    .metric-box{
      flex:1;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:12px;
      padding:10px;
    }

    .metric-value{
      font-size:22px;
      font-weight:bold;
    }

    .rec-dot{
      display:inline-block;
      width:10px;
      height:10px;
      border-radius:50%;
      background:#ff3b30;
      margin-right:8px;
      box-shadow:0 0 10px rgba(255,59,48,.8);
    }

    .speedBar{
      height:12px;
      border-radius:10px;
      background:#222;
      overflow:hidden;
      margin-top:10px;
    }

    .speedFill{
      height:100%;
      width:0%;
      background:linear-gradient(to right,#ff2d2d,#ff0000);
    }

    .miniBtn{
      padding:8px 12px;
      font-size:13px;
      border:none;
      border-radius:10px;
      color:white;
      font-weight:600;
      background:rgba(255,45,45,0.5);
      backdrop-filter:blur(8px);
      box-shadow:0 0 12px rgba(255,0,0,0.35);
      width:auto;
      display:inline-block;
      transition:all 0.2s ease;
      margin-bottom:10px;
    }

    .miniBtn:active{
      transform:scale(0.95);
      background:rgba(255,45,45,0.8);
    }

    .history-video{
      width:100%;
      margin-top:10px;
      border-radius:10px;
      display:block;
      height:auto;
      object-fit:contain;
      background:#000;
      transition:transform 0.2s ease;
      transform-origin:center center;
    }

    .side-buttons{
      position:fixed;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      display:flex;
      flex-direction:column;
      gap:10px;
      z-index:4;
      width:120px;
    }

    .side-buttons .btn{
      width:120px;
      padding:10px;
      font-size:14px;
      margin-top:0;
      opacity:0.9;
    }
  </style>
</head>

<body>

  <!-- HOME -->
  <div id="home" class="screen active">
    <div class="header">🏃 Track Star</div>
    <div class="sub">Train Faster. Run Smarter.</div>

    <div class="card">
      <b>BEST TIMES</b><br>
      100m: 11.2s | 200m: 24.5s | 400m: 58.2s
    </div>

    <button class="btn" onclick="showScreen('setup')">Start New Run</button>
    <button class="btn" onclick="goToHistory()">View History</button>
    <button class="btn" onclick="switchUser()">Switch User</button>
    <button class="btn" onclick="showProfiles()">Athlete Profiles</button>
  </div>

  <!-- SETUP -->
  <div id="setup" class="screen">
    <div class="header">Select Event</div>

    <div style="margin-top:15px;">
      <div style="color:#aaa;font-size:14px;margin-bottom:6px;">Select Lane</div>
      <select onchange="selectedLane = Number(this.value); updateLaneUI();" style="
        width:100%;
        padding:12px;
        border-radius:10px;
        border:none;
        font-size:16px;
        background:#222;
        color:white;
      ">
        <option value="1">Lane 1</option>
        <option value="2">Lane 2</option>
        <option value="3">Lane 3</option>
        <option value="4">Lane 4</option>
        <option value="5">Lane 5</option>
      </select>
    </div>

    <button class="btn" onclick="startRun(100)">100m</button>
    <button class="btn" onclick="startRun(200)">200m</button>
    <button class="btn" onclick="startRun(400)">400m</button>
    <button class="btn" onclick="startRun(800)">800m</button>
    <button class="btn" onclick="startRun(1600)">1600m</button>

    <button class="btn" onclick="showScreen('home')">Back</button>
  </div>

  <!-- LIVE -->
  <div id="live" class="screen">
    <video id="camera" autoplay playsinline muted></video>

    <canvas id="laneOverlay"></canvas>

    <div class="controls">
      <div id="liveUser" style="
        font-size:16px;
        color:#ff4d4d;
        font-weight:bold;
        margin-bottom:10px;
      ">
        🏃 Runner: Default
      </div>

      <button class="miniBtn" onclick="toggleFocus()">Focus</button>

      <div id="laneDisplay" style="
        font-size:14px;
        color:#aaa;
        margin-bottom:10px;
      ">
        Lane: 1
      </div>

      <canvas id="speedChart" width="600" height="140" style="
        width:100%;
        background:rgba(0,0,0,0.45);
        border-radius:14px;
        margin-bottom:12px;
      "></canvas>

      <div class="card" style="margin-top:0;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="font-size:16px;color:#ff4d4d;font-weight:bold;">
            🏃 Runner: <span id="liveUserText">Default</span>
          </div>
          <div id="recordingBadge" style="font-size:13px;font-weight:bold;display:none;">
            <span class="rec-dot"></span>REC
          </div>
        </div>

        <div class="metric-row">
          <div class="metric-box">
            <div class="subtle-label">Time</div>
            <div id="timer" class="metric-value">0.00s</div>
          </div>
          <div class="metric-box">
            <div class="subtle-label">Speed</div>
            <div id="speed" class="metric-value">0 mph</div>
          </div>
        </div>

        <div class="metric-box" style="margin-top:10px;">
          <div class="subtle-label">Split</div>
          <div id="splitDisplay" class="metric-value" style="font-size:18px;">Split: --</div>

          <div class="speedBar">
            <div id="speedFill" class="speedFill"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="side-buttons">
      <button class="btn" onclick="beginMovement()">Start</button>
      <button class="btn" onclick="markSplit()">Split</button>
      <button class="btn" onclick="stopRun()">Finish</button>
      <button class="btn" onclick="resetRun()">Reset</button>
      <button class="btn" onclick="flipCamera()">Flip</button>
      <button class="btn" onclick="backupData()">Backup</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen">
    <div class="header">Results</div>
    <div id="resultsUser" style="font-size:16px;color:#ff4d4d;font-weight:bold;"></div>

    <div class="card">
      <p id="finalTime"></p>
      <p id="finalSpeed"></p>
    </div>

    <div class="card" id="splitsBox"></div>

    <button class="btn" onclick="showScreen('home')">Back Home</button>
  </div>

  <!-- PROFILES -->
  <div id="profiles" class="screen">
    <div class="header">Athlete Profiles</div>
    <div id="profilesList" class="card"></div>
    <button class="btn" onclick="addAthlete()">Add Athlete</button>
    <button class="btn" onclick="showScreen('home')">Back</button>
  </div>

  <!-- HISTORY -->
  <div id="history" class="screen">
    <div class="header">History</div>
    <div class="card" id="historyList"></div>
    <button class="btn" onclick="clearHistory()">Clear History</button>
    <button class="btn" onclick="showScreen('home')">Back</button>
  </div>

  <!-- REPLAY -->
  <div id="replay" class="screen">
    <div class="header">Coach Replay</div>

    <div class="card">
      <div id="replayTitle" style="font-weight:bold;margin-bottom:10px;"></div>

      <div style="overflow:hidden;border-radius:12px;">
        <video id="replayVideo" class="history-video" controls playsinline></video>
      </div>
    </div>

    <div style="margin-top:15px;">
      <div style="font-size:12px;color:#aaa;margin-bottom:5px;">Zoom</div>
      <input
        type="range"
        min="1"
        max="5"
        step="0.1"
        value="1"
        oninput="zoomReplay(this.value)"
        style="width:100%;">
    </div>

    <div class="card">
      <button class="btn" onclick="setReplaySpeed(0.5)">0.5x</button>
      <button class="btn" onclick="setReplaySpeed(1)">1x</button>
      <button class="btn" onclick="setReplaySpeed(1.5)">1.5x</button>
      <button class="btn" onclick="jumpReplay(-2)">-2 sec</button>
      <button class="btn" onclick="jumpReplay(2)">+2 sec</button>
      <button class="btn" onclick="zoomReplay(zoomLevel + 0.5)">Zoom +</button>
      <button class="btn" onclick="zoomReplay(zoomLevel - 0.5)">Zoom -</button>
    </div>

    <button class="btn" onclick="goToHistory()">Back to History</button>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

// 🔥 GLOBAL ERROR HANDLER
window.onerror = function(msg, url, line){
  console.error("ERROR:", msg, "Line:", line);
};

// 🔥 SAFE SUPABASE INIT (NO CRASH)
let supabase = null;

if(window.supabase){
  try{
    supabase = window.supabase.createClient(
      "YOUR_SUPABASE_URL",
      "YOUR_SUPABASE_ANON_KEY"
    );
  }catch(e){
    console.warn("Supabase not connected");
  }
}

// 🔥 STATE
let useBackCamera = true;
let currentStream = null;
let mediaRecorder = null;
let recordedChunks = [];

let currentUser = localStorage.getItem("currentUser") || "Default";

let startTime = null;
let timer = null;
let distance = 100;
let splits = [];
let speeds = [];
let chartData = [];
let isRunning = false;
let selectedLane = 1;
let zoomLevel = 1;

// ---------------- NAV ----------------
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if(el) el.classList.add('active');
}

// ---------------- USER ----------------
function updateActiveUserUI(){
  const liveUserText = document.getElementById("liveUserText");
  const liveUser = document.getElementById("liveUser");
  const resultsUser = document.getElementById("resultsUser");

  if(liveUserText) liveUserText.innerText = currentUser;
  if(liveUser) liveUser.innerText = "🏃 Runner: " + currentUser;
  if(resultsUser) resultsUser.innerText = "🏁 Athlete: " + currentUser;
}

// ---------------- LOGIN ----------------
async function quickLogin(){
  if(!supabase){
    alert("Supabase not connected");
    return;
  }

  let email = prompt("Email:");
  let password = prompt("Password:");

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if(error) alert("Login failed");
  else alert("Logged in");
}

// ---------------- START RUN ----------------
function startRun(d){
  distance = d;
  splits = [];
  speeds = [];
  chartData = [];
  isRunning = false;
  startTime = null;

  clearInterval(timer);

  document.getElementById('timer').innerText = "0.00s";
  document.getElementById('speed').innerText = "0 mph";
  document.getElementById('splitDisplay').innerText = "Split: --";

  updateActiveUserUI();
  showScreen('live');

  startCamera();
}

// ---------------- CAMERA ----------------
async function startCamera(){
  try{
    if(currentStream){
      currentStream.getTracks().forEach(t=>t.stop());
    }

    currentStream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode: useBackCamera ? "environment":"user" },
      audio:false
    });

    const video = document.getElementById("camera");

    if(video){
      video.srcObject = currentStream;
      video.onloadedmetadata = () => video.play().catch(()=>{});
    }

    recordedChunks = [];

    if(window.MediaRecorder){
      mediaRecorder = new MediaRecorder(currentStream);

      mediaRecorder.ondataavailable = e=>{
        if(e.data.size > 0) recordedChunks.push(e.data);
      };

      mediaRecorder.start();
    }

  }catch(err){
    console.error(err);
    alert("Camera blocked or failed");
  }
}

// ---------------- CAMERA FLIP ----------------
function flipCamera(){
  useBackCamera = !useBackCamera;
  startCamera();
}

// ---------------- RUN ----------------
function beginMovement(){
  if(isRunning) return;

  isRunning = true;
  startTime = Date.now();

  timer = setInterval(update,100);
}

function update(){
  if(!isRunning || !startTime) return;

  const t = (Date.now() - startTime)/1000;
  document.getElementById('timer').innerText = t.toFixed(2)+"s";

  const speed = (distance/Math.max(t,0.1))*2.237;

  speeds.push(speed);
  chartData.push(speed);

  document.getElementById('speed').innerText = speed.toFixed(1)+" mph";
  document.getElementById('speedFill').style.width = (speed/22*100)+"%";

  drawSpeedChart();
}

function markSplit(){
  if(!isRunning || !startTime) return;

  const t = (Date.now()-startTime)/1000;
  const prev = splits.length ? splits[splits.length-1].time : 0;
  const seg = t - prev;

  const speed = (distance/4)/Math.max(seg,0.1)*2.237;

  splits.push({time:t,segmentTime:seg,speed});

  document.getElementById("splitDisplay").innerText =
    `Split ${splits.length}: ${seg.toFixed(2)}s`;
}

// ---------------- STOP RUN ----------------
async function stopRun(){

  clearInterval(timer);

  if(!startTime) return;

  const t = (Date.now()-startTime)/1000;
  const speed = (distance/Math.max(t,0.1))*2.237;

  document.getElementById('finalTime').innerText = "Time: "+t.toFixed(2);
  document.getElementById('finalSpeed').innerText = "Speed: "+speed.toFixed(2);

  let videoURL = null;

  try{
    if(mediaRecorder && mediaRecorder.state !== "inactive"){

      const stopPromise = new Promise(resolve=>{
        mediaRecorder.onstop = resolve;
      });

      mediaRecorder.stop();
      await stopPromise;

      const blob = new Blob(recordedChunks,{type:"video/webm"});

      if(blob.size > 0 && supabase){
        videoURL = await uploadVideo(blob);
      }
    }
  }catch(e){
    console.error("Video fail:", e);
  }

  if(supabase){
    await saveRunToCloud(t,speed,videoURL);
  }

  showSplits();
  showScreen("results");

  if(currentStream){
    currentStream.getTracks().forEach(t=>t.stop());
  }

  isRunning = false;
}

// ---------------- SAVE ----------------
async function uploadVideo(blob){
  if(!supabase) return null;

  const fileName = "run_"+Date.now()+".webm";

  const { error } = await supabase.storage
    .from("videos")
    .upload(fileName, blob);

  if(error){
    console.error(error);
    return null;
  }

  return supabase.storage
    .from("videos")
    .getPublicUrl(fileName).data.publicUrl;
}

async function saveRunToCloud(time,speed,videoURL){
  if(!supabase) return;

  const { data:{user} } = await supabase.auth.getUser();
  if(!user) return;

  await supabase.from("runs").insert([{
    user_id:user.id,
    distance,
    time,
    speed,
    video_url:videoURL,
    date:new Date()
  }]);
}

// ---------------- UI ----------------
function showSplits(){
  let html="<b>Splits</b><br>";

  if(splits.length === 0){
    html += "No splits";
  } else {
    splits.forEach((s,i)=>{
      html+=`Split ${i+1}: ${s.segmentTime.toFixed(2)}s (${s.speed.toFixed(1)} mph)<br>`;
    });
  }

  document.getElementById("splitsBox").innerHTML = html;
}

// ---------------- HISTORY ----------------
async function showHistory(){

  if(!supabase){
    document.getElementById("historyList").innerHTML="Supabase not connected";
    return;
  }

  const { data:{user} } = await supabase.auth.getUser();

  if(!user){
    document.getElementById("historyList").innerHTML="Login first";
    return;
  }

  const { data } = await supabase
    .from("runs")
    .select("*")
    .eq("user_id",user.id)
    .order("date",{ascending:false});

  let html="";
  data.forEach(r=>{
    html+=`
      <div class="card">
        ${r.distance}m - ${Number(r.time).toFixed(2)}s<br>
        ⚡ ${Number(r.speed).toFixed(2)} mph<br>
        ${new Date(r.date).toLocaleString()}
        ${r.video_url ? `<video controls class="history-video" src="${r.video_url}"></video>` : ""}
      </div>
    `;
  });

  document.getElementById("historyList").innerHTML = html;
}

function goToHistory(){
  showScreen("history");
  showHistory();
}

// ---------------- CHART ----------------
function drawSpeedChart(){
  const c=document.getElementById("speedChart");
  if(!c) return;

  const ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  if(chartData.length<2) return;

  const max=Math.max(...chartData,1);

  ctx.beginPath();
  ctx.strokeStyle="#ff3b30";
  ctx.lineWidth=3;

  chartData.forEach((v,i)=>{
    const x=(i/chartData.length)*c.width;
    const y=c.height-(v/max)*(c.height-10);
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.stroke();
}

// INIT
updateActiveUserUI();

</script>
</body>
</html>
