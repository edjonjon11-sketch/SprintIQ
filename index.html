<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SprintIQ Pro</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(to bottom,#000,#111);
  color:white;
}

.screen{display:none;padding:20px;}
.active{display:block;}

.header{font-size:28px;font-weight:bold;}
.sub{color:#aaa;margin-bottom:10px;}

.card{
  background:#111;
  padding:16px;
  border-radius:16px;
  margin-top:15px;
  box-shadow:0 0 20px rgba(255,0,0,.2);
}

.btn{
  width:100%;
  padding:16px;
  font-size:18px;
  border:none;
  border-radius:14px;
  margin-top:12px;
  color:white;
  font-weight:bold;
  background:linear-gradient(to right,#ff2d2d,#ff5a5a);
}

video{
  width:100%;
  height:200px;
  border-radius:14px;
  object-fit:cover;
  background:black;
}

.bigTimer{
  font-size:42px;
  font-weight:bold;
}

.speedBar{
  height:12px;
  border-radius:10px;
  background:#222;
  overflow:hidden;
  margin-top:10px;
}

.speedFill{
  height:100%;
  width:0%;
  background:linear-gradient(to right,#ff2d2d,#ff0000);
}

canvas{
  width:100%;
  height:100px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="header">🏃 SprintIQ Pro</div>
  <div class="sub">Train Faster. Run Smarter.</div>

  <div class="card">
    <b>BEST TIMES</b><br>
    100m: 11.2s | 200m: 24.5s | 400m: 58.2s
  </div>

  <button class="btn" onclick="showScreen('setup')">Start New Run</button>
  <button class="btn" onclick="showHistory(); showScreen('history')">
  View History
</button>
</div>

<div id="setup" class="screen">
  <div class="header">Select Event</div>

  <button class="btn" onclick="startRun(100)">100m</button>
  <button class="btn" onclick="startRun(200)">200m</button>
  <button class="btn" onclick="startRun(400)">400m</button>
  <button class="btn" onclick="startRun(800)">800m</button>
  <button class="btn" onclick="startRun(1600)">1600m</button>

  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<!-- LIVE -->
<div id="live" class="screen">
  <div class="header">Live Run</div>

  <video id="camera" autoplay playsinline muted></video>

  <canvas id="chart"></canvas>

  <div class="card">
    <div id="timer" class="bigTimer">0.00s</div>
    <div id="speed">Speed: 0 mph</div>
    <div id="split">Split: --</div>

    <div class="speedBar">
      <div id="speedFill" class="speedFill"></div>
    </div>
  </div>

  <button class="btn" onclick="beginMovement()">Start Movement</button>
  <button class="btn" onclick="markSplit()">Mark Split</button>
  <button class="btn" onclick="stopRun()">Finish Run</button>
  <button class="btn" onclick="resetRun()">Reset Run</button>by
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="header">Results</div>

  <div class="card">
    <p id="finalTime"></p>
    <p id="finalSpeed"></p>
  </div>

  <div class="card" id="splitsBox"></div>

  <button class="btn" onclick="showScreen('home')">Back Home</button>
</div>

<!-- HISTORY -->
<div id="history" class="screen">
  <div class="header">History</div>
  <div class="card" id="historyList"></div>
  <button class="btn" onclick="clearHistory()">Clear History</button>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<script>

let currentUser = localStorage.getItem("currentUser") || "Default";
let startTime;
let timer;
let distance=100;
let splits=[];
let speeds=[];
let chartData=[];
  // LAP TRACKING
let lapDistance = 400;
let totalLaps = 1;
let currentLap = 0;
function clearHistory(){
  let allData = JSON.parse(localStorage.getItem("SprintIQUsers") || "{}");

  allData[currentUser] = [];

  localStorage.setItem("SprintIQUsers", JSON.stringify(allData));

  showHistory();
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startRun(d){
  distance = d;
  splits = [];
  speeds = [];
  chartData = [];

  totalLaps = Math.max(1, Math.round(distance / 400));
  currentLap = 0;

  isRunning = false; // 🚨 FIX
  startTime = null;

  document.getElementById('timer').innerText = "0.00s";
  document.getElementById('speed').innerText = "Speed: 0 mph";
  document.getElementById('splitDisplay').innerText = "Split: --";

  showScreen('live');
  startCamera();
}

  function saveRunToHistory(finalTime, finalSpeed) {
  let allData = JSON.parse(localStorage.getItem("SprintIQUsers") || "{}");

  if (!allData[currentUser]) {
    allData[currentUser] = [];
  }

  allData[currentUser].push({
    distance: distance,
    time: finalTime,
    speed: finalSpeed,
    date: new Date().toLocaleString()
  });

  localStorage.setItem("SprintIQUsers", JSON.stringify(allData));
}
async function startCamera(){
  let stream=await navigator.mediaDevices.getUserMedia({video:true});
  document.getElementById('camera').srcObject=stream;
}

function beginRun(){
  startTime=Date.now();
  timer=setInterval(update,100);
}

function update(){
  let t=(Date.now()-startTime)/1000;
  document.getElementById('timer').innerText=t.toFixed(2)+"s";

  let speed=Math.min((distance/t)*2.237,22);
  speeds.push(speed);

  document.getElementById('speed').innerText="Speed: "+speed.toFixed(1)+" mph";

  document.getElementById('speedFill').style.width=(speed/22*100)+"%";

  chartData.push(speed);
  drawChart();
}
  // AUTO LAP TRACKING
let elapsed = (Date.now() - startTime) / 1000;

// estimate progress (simple but works)
let progress = elapsed / (distance / 10);
let estimatedDistance = progress * distance;

let lapIndex = Math.floor(estimatedDistance / lapDistance);

if (lapIndex > currentLap && lapIndex < totalLaps) {
  currentLap = lapIndex;

  let splitTime = elapsed;
  splits.push(splitTime);

  document.getElementById('split').innerText =
    "Lap " + currentLap + ": " + splitTime.toFixed(2) + "s";
}

function markSplit(){
  if(!isRunning) return;

  let time = (Date.now() - startTime) / 1000;
  let speed = speeds[speeds.length - 1] || 0;

  splits.push({
    time: time,
    speed: speed,
    lap: currentLap + 1
  });

  currentLap++;

  document.getElementById('splitDisplay').innerText =
    `Lap ${currentLap}: ${time.toFixed(2)}s | ${speed.toFixed(1)} mph`;
}
}

function stopRun(){
  clearInterval(timer);

  let t=(Date.now()-startTime)/1000;
  let speed=(distance/t)*2.237;

  document.getElementById('finalTime').innerText="Time: "+t.toFixed(2);
  document.getElementById('finalSpeed').innerText="Speed: "+speed.toFixed(2);

  saveRun(t,speed);
  showSplits();
saveRunToHistory(finalTime, finalSpeed);
  showScreen('results');
}

function showSplits(){
  let html = "<b>Splits</b><br>";

  if(splits.length === 0){
    html += "No splits recorded";
  } else {
    splits.forEach((s, i) => {
      html += `Lap ${i+1}: ${s.time.toFixed(2)}s | ${s.speed.toFixed(1)} mph<br>`;
    });
  }

  document.getElementById('splitsBox').innerHTML = html;
}
}
function showHistory(){
  let allData = JSON.parse(localStorage.getItem("SprintIQUsers") || "{}");
  let userRuns = allData[currentUser] || [];

  let html = "<b>" + currentUser + " History</b><br><br>";

  if(userRuns.length === 0){
    html += "No runs yet";
  } else {
    userRuns.slice().reverse().forEach(run => {
      html += `
        ${run.distance}m - ${run.time.toFixed(2)}s 
        (${run.speed.toFixed(2)} mph)<br>
        <small>${run.date}</small><br><br>
      `;
    });
  }

  document.getElementById("historyList").innerHTML = html;
}

  
function saveRun(time,speed){
  let runs=JSON.parse(localStorage.getItem("runs")||"[]");

  runs.unshift({
    time:time.toFixed(2),
    speed:speed.toFixed(2),
    date:new Date().toLocaleDateString()
  });

  localStorage.setItem("runs",JSON.stringify(runs));
}

function showHistory(){
  showScreen('history');

  let runs=JSON.parse(localStorage.getItem("runs")||"[]");

  let html="";
  runs.forEach(r=>{
    html+=`
      <div style="margin-bottom:10px">
        ${r.date}<br>
        ${r.time}s | ${r.speed} mph
      </div>
    `;
  });

  document.getElementById('historyList').innerHTML=html;
}

function drawChart(){
  let c=document.getElementById('chart');
  let ctx=c.getContext('2d');

  ctx.clearRect(0,0,c.width,c.height);

  let max=Math.max(...chartData,1);

  ctx.beginPath();
  ctx.strokeStyle="red";

  chartData.forEach((v,i)=>{
    let x=i*3;
    let y=c.height-(v/max*c.height);

    if(i==0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.stroke();
}

</script>

</body>
</html>
