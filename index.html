<!DOCTYPE html>
<html>
<head>
  <title>SprintIQ Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family:-apple-system; background:#000; color:white; }
    .screen { display:none; padding:20px; }
    .active { display:block; }
    .header { font-size:26px; font-weight:bold; }
    .card { background:#111; padding:15px; border-radius:15px; margin-top:15px; }
    .btn {
      width:100%; padding:15px; font-size:18px;
      background:#e50914; color:white;
      border:none; border-radius:12px; margin-top:10px;
    }
    video { width:100%; border-radius:12px; margin-top:10px; }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="header">🏃 SprintIQ Pro</div>
  <p>Track + AI Coaching</p>
  <button class="btn" onclick="showScreen('setup')">Start Run</button>
</div>

<!-- SETUP -->
<div id="setup" class="screen">
  <div class="header">Select Event</div>

  <button class="btn" onclick="startRun(100)">100m</button>
  <button class="btn" onclick="startRun(200)">200m</button>
  <button class="btn" onclick="startRun(400)">400m</button>
  <button class="btn" onclick="startRun(800)">800m</button>
  <button class="btn" onclick="startRun(1600)">1600m</button>
  <button class="btn" onclick="startRun(100)">100m Hurdles</button>
</div>

<!-- LIVE -->
<div id="live" class="screen">
  <div class="header">Live Run</div>
  <video id="camera" autoplay playsinline></video>

  <div class="card">
    <p id="timer">0.00s</p>
    <p id="speed">Speed: 0 mph</p>
    <p id="splitDisplay">Split: --</p>
  </div>

  <button class="btn" onclick="stopRun()">Finish Run</button>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="header">Results</div>

  <div class="card">
    <p id="finalTime"></p>
    <p id="finalSpeed"></p>
  </div>

  <div class="card" id="splitsBox"></div>

  <div class="card" id="aiFeedback"></div>

  <button class="btn" onclick="showScreen('home')">Back Home</button>
</div>

<script>
let startTime;
let timerInterval;
let distance = 100;
let speedHistory = [];
let splits = [];
let isRunning = false;
let currentCamera = "environment"; // back camera

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startRun(dist) {
  distance = dist;
  speedHistory = [];
  splits = [];
  isRunning = false;

  showScreen('live');
  startCamera();

  document.getElementById('timer').innerText = "0.00s";
  document.getElementById('speed').innerText = "Speed: 0 mph";
}

function startCamera() {
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: currentCamera }
  }).then(stream => {
    document.getElementById('camera').srcObject = stream;
  });
}

// 🔄 Switch Camera
function switchCamera() {
  currentCamera = currentCamera === "environment" ? "user" : "environment";
  startCamera();
}

// ▶️ Start actual timing
function beginMovement() {
  if (!isRunning) {
    isRunning = true;
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 100);
  }
}

function updateTimer() {
  let time = (Date.now() - startTime) / 1000;
  document.getElementById('timer').innerText = time.toFixed(2) + "s";

  // More realistic speed cap
  let speed = Math.min((distance / time) * 2.237, 22);
  speedHistory.push(speed);

  document.getElementById('speed').innerText =
    "Speed: " + speed.toFixed(2) + " mph";
}

// 👆 Manual split
function markSplit() {
  let time = (Date.now() - startTime) / 1000;
  splits.push(time);

  document.getElementById('splitDisplay').innerText =
    "Split " + splits.length + ": " + time.toFixed(2) + "s";
}

function stopRun() {
  clearInterval(timerInterval);

  let finalTime = (Date.now() - startTime) / 1000;
  let finalSpeed = (distance / finalTime) * 2.237;

  document.getElementById('finalTime').innerText =
    "Time: " + finalTime.toFixed(2) + "s";

  document.getElementById('finalSpeed').innerText =
    "Avg Speed: " + finalSpeed.toFixed(2) + " mph";

  displaySplits();
  generateAI();

  showScreen('results');
}

function displaySplits() {
  let html = "<b>Splits:</b><br>";
  splits.forEach((s, i) => {
    html += "Split " + (i+1) + ": " + s.toFixed(2) + "s<br>";
  });
  document.getElementById('splitsBox').innerHTML = html;
}

function generateAI() {
  let feedback = "";
  let maxSpeed = Math.max(...speedHistory);
  let endSpeed = speedHistory[speedHistory.length - 1];

  if (endSpeed < maxSpeed * 0.8) {
    feedback += "⚠️ Fatigue detected — improve endurance.<br>";
  } else {
    feedback += "🔥 Strong finish.<br>";
  }

  document.getElementById('aiFeedback').innerHTML = feedback;
}
</script>
