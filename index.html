<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Star Elite</title>

<style>
:root{
  --bg:#050505;
  --panel:#121212;
  --text:#fff;
  --muted:#aaa;
  --accent:#ff3b30;
  --accent2:#ff6b60;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(#000,#111);
  color:white;
}

.screen{display:none;padding:20px;}
.active{display:block;}

.header{font-size:28px;font-weight:800;}
.card{
  background:#111;
  padding:15px;
  border-radius:14px;
  margin-top:10px;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:linear-gradient(to right,var(--accent),var(--accent2));
  color:white;
  font-weight:bold;
}

#camera{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.controls{
  position:fixed;
  bottom:0;
  width:100%;
  padding:15px;
  background:rgba(0,0,0,0.9);
}

.metric{font-size:22px;font-weight:bold;}

.history-video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="home" class="screen active">
  <div class="header">🏃 Track Star Elite</div>
  <button class="btn" onclick="showScreen('setup')">Start Run</button>
  <button class="btn" onclick="goToHistory()">History</button>
</div>

<div id="setup" class="screen">
  <div class="header">Select Distance</div>
  <button class="btn" onclick="startRun(100)">100m</button>
  <button class="btn" onclick="startRun(200)">200m</button>
  <button class="btn" onclick="startRun(400)">400m</button>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<div id="live" class="screen">
  <video id="camera" autoplay playsinline muted></video>

  <div class="controls">
    <div id="timer" class="metric">0.00s</div>
    <div id="speed" class="metric">0 mph</div>
    <div id="splitDisplay">Split: --</div>

    <!-- SIDE CONTROL PANEL -->
<div style="
  position:fixed;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:5;
">

  <button class="btn" style="width:120px;padding:10px;font-size:14px;" onclick="beginMovement()">Start</button>

  <button class="btn" style="width:120px;padding:10px;font-size:14px;" onclick="markSplit()">Split</button>

  <button class="btn" style="width:120px;padding:10px;font-size:14px;" onclick="stopRun()">Finish</button>

  <button class="btn" style="width:120px;padding:10px;font-size:14px;" onclick="resetRun()">Reset</button>

  <button class="btn" style="width:120px;padding:10px;font-size:14px;" onclick="flipCamera()">Flip</button>

</div>
</div>

<div id="results" class="screen">
  <div class="header">Results</div>
  <div id="finalTime"></div>
  <div id="finalSpeed"></div>
  <div id="splitsBox"></div>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<div id="history" class="screen">
  <div class="header">History</div>
  <div id="historyList"></div>
  <button class="btn" onclick="clearHistory()">Clear</button>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<script>
let useBackCamera = true;
let currentStream = null;
let mediaRecorder = null;
let recordedChunks = [];

let distance = 100;
let startTime = null;
let timer = null;
let splits = [];
let speeds = [];
let isRunning = false;

// NAV
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToHistory(){
  showHistory();
  showScreen('history');
}

// CAMERA (SAFE)
async function startCamera(){
  try{
    if(currentStream){
      currentStream.getTracks().forEach(t=>t.stop());
    }

    currentStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:useBackCamera?"environment":"user"},
      audio:false
    });

    document.getElementById("camera").srcObject = currentStream;

    recordedChunks = [];

    if(typeof MediaRecorder !== "undefined"){
      mediaRecorder = new MediaRecorder(currentStream);

      mediaRecorder.ondataavailable = e=>{
        if(e.data.size>0) recordedChunks.push(e.data);
      };

      mediaRecorder.start();
    }

  }catch(err){
    console.error(err);
    alert("Camera failed — tap Start again.");
  }
}

function flipCamera(){
  useBackCamera = !useBackCamera;
  startCamera();
}

// START RUN
function startRun(d){
  distance = d;
  splits = [];
  speeds = [];
  isRunning = false;
  startTime = null;

  document.getElementById("timer").innerText = "0.00s";
  document.getElementById("speed").innerText = "0 mph";
  document.getElementById("splitDisplay").innerText = "Split: --";

  showScreen("live");
}

// START (USER TAP REQUIRED)
function beginMovement(){
  if(isRunning) return;

  startCamera(); // 🔥 must be here for iPhone

  isRunning = true;
  startTime = Date.now();

  if(timer) clearInterval(timer);
  timer = setInterval(update,100);
}

// UPDATE
function update(){
  if(!isRunning) return;

  let t = (Date.now() - startTime)/1000;

  document.getElementById("timer").innerText = t.toFixed(2)+"s";

  let speed = Math.min((distance / Math.max(t,0.1))*2.237,22);
  speeds.push(speed);

  document.getElementById("speed").innerText = speed.toFixed(1)+" mph";
}

// SPLIT (ELITE VERSION)
function markSplit(){
  if(!isRunning) return;

  let t = (Date.now() - startTime)/1000;
  let prev = splits.length ? splits[splits.length-1].time : 0;
  let segment = t - prev;

  let speed = speeds[speeds.length-1] || 0;

  splits.push({
    time: t,
    segmentTime: segment,
    speed: speed
  });

  document.getElementById("splitDisplay").innerText =
    `Split ${splits.length}: ${segment.toFixed(2)}s (${speed.toFixed(1)} mph)`;
}

// STOP RUN (SAFE + RECORDING)
function stopRun(){

  if(timer) clearInterval(timer);

  let t = startTime ? (Date.now() - startTime)/1000 : 0;
  let speed = t > 0 ? (distance / t) * 2.237 : 0;

  document.getElementById("finalTime").innerText = "Time: " + t.toFixed(2);
  document.getElementById("finalSpeed").innerText = "Speed: " + speed.toFixed(2);

  const finish = () => {
    showSplits();
    showScreen("results");
  };

  try{

    // ✅ If no recorder → still finish
    if(!mediaRecorder){
      saveRun(t, speed, null);
      finish();
      return;
    }

    // ✅ If already stopped → still finish
    if(mediaRecorder.state === "inactive"){
      saveRun(t, speed, null);
      finish();
      return;
    }

    mediaRecorder.onstop = function(){
      try{

        if(!recordedChunks || recordedChunks.length === 0){
          saveRun(t, speed, null);
          finish();
          return;
        }

        const blob = new Blob(recordedChunks, { type: "video/webm" });

        if(blob.size === 0){
          saveRun(t, speed, null);
          finish();
          return;
        }

        const reader = new FileReader();

        reader.onloadend = function(){
          saveRun(t, speed, reader.result);
          finish();
        };

        reader.readAsDataURL(blob);

      }catch(err){
        console.error("Video fail:", err);
        saveRun(t, speed, null);
        finish();
      }
    };

    mediaRecorder.stop();

  }catch(err){
    console.error("StopRun crash:", err);
    saveRun(t, speed, null);
    finish();
  }

  isRunning = false;
}

// SPLITS DISPLAY
function showSplits(){
  let html = "<b>Splits</b><br>";

  if(splits.length === 0){
    html += "No splits recorded";
  }else{
    splits.forEach((s,i)=>{
      html += `Split ${i+1}: ${s.segmentTime.toFixed(2)}s (${s.speed.toFixed(1)} mph)<br>`;
    });
  }

  document.getElementById("splitsBox").innerHTML = html;
}

// SAVE RUN
function saveRun(time,speed,video){
  let data = JSON.parse(localStorage.getItem("runs")||"[]");

  data.push({
    distance,
    time,
    speed,
    splits,
    video,
    date:new Date().toLocaleString()
  });

  localStorage.setItem("runs",JSON.stringify(data));
}

// HISTORY (CLEAN — NO DUPLICATES)
function showHistory(){
  let data = JSON.parse(localStorage.getItem("runs")||"[]");

  let html = "";

  if(data.length === 0){
    html = "No runs yet";
  }else{
    data.slice().reverse().forEach((r,index)=>{
      html += `
        <div class="card">
          <b>${r.distance}m - ${r.time.toFixed(2)}s</b><br>
          ⚡ ${r.speed.toFixed(2)} mph<br>
          <div style="font-size:12px;color:#aaa;">${r.date}</div>
      `;

      if(r.splits){
        r.splits.forEach((s,i)=>{
          html += `Split ${i+1}: ${s.segmentTime.toFixed(2)}s<br>`;
        });
      }

      html += `<button class="btn" onclick="openReplay(${data.length-1-index})">Replay</button>`;

      if(r.video){
        html += `<video class="history-video" controls src="${r.video}"></video>`;
      }

      html += `</div>`;
    });
  }

  document.getElementById("historyList").innerHTML = html;
}

// REPLAY
function openReplay(index){
  let data = JSON.parse(localStorage.getItem("runs")||"[]");
  let run = data[index];

  if(!run || !run.video){
    alert("No video available");
    return;
  }

  let video = document.getElementById("replayVideo");
  video.src = run.video;

  showScreen("replay");
}

function resetRun(){
  if(timer) clearInterval(timer);

  isRunning = false;
  startTime = null;
  splits = [];
  speeds = [];

  document.getElementById("timer").innerText = "0.00s";
  document.getElementById("speed").innerText = "0 mph";
  document.getElementById("splitDisplay").innerText = "Split: --";
}
  
// CLEAR
function clearHistory(){
  localStorage.removeItem("runs");
  showHistory();
}
</script>

</body>
</html>
