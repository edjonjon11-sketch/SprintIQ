<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SprintIQ Pro</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:linear-gradient(to bottom,#000,#111);
  color:white;
}

.screen{display:none;padding:20px;}
.active{display:block;}

.header{font-size:28px;font-weight:bold;}
.sub{color:#aaa;margin-bottom:10px;}

.card{
  background:#111;
  padding:16px;
  border-radius:16px;
  margin-top:15px;
  box-shadow:0 0 20px rgba(255,0,0,.2);
}

.btn{
  width:100%;
  padding:16px;
  font-size:18px;
  border:none;
  border-radius:14px;
  margin-top:12px;
  color:white;
  font-weight:bold;
  background:linear-gradient(to right,#ff2d2d,#ff5a5a);
}

#camera{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  object-fit:cover;
  z-index:1;
}

.history-video{
  width:100%;
  margin-top:10px;
  border-radius:10px;
  display:block;
  position:static;
  height:auto;
  object-fit:contain;
}

.controls{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:15px;
  z-index:2;
  box-sizing:border-box;
  background:linear-gradient(
    to top,
    rgba(0,0,0,0.9),
    rgba(0,0,0,0)
  );
}

.bigTimer{
  font-size:42px;
  font-weight:bold;
}

.subtle-label{
  font-size:12px;
  color:#aaa;
  letter-spacing:0.08em;
  text-transform:uppercase;
}

.metric-row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.metric-box{
  flex:1;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;
  padding:10px;
}

.metric-value{
  font-size:22px;
  font-weight:bold;
}

.rec-dot{
  display:inline-block;
  width:10px;
  height:10px;
  border-radius:50%;
  background:#ff3b30;
  margin-right:8px;
  box-shadow:0 0 10px rgba(255,59,48,.8);
}
  
.speedBar{
  height:12px;
  border-radius:10px;
  background:#222;
  overflow:hidden;
  margin-top:10px;
}

.speedFill{
  height:100%;
  width:0%;
  background:linear-gradient(to right,#ff2d2d,#ff0000);
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="header">🏃 SprintIQ Pro</div>
  <div class="sub">Train Faster. Run Smarter.</div>

  <div class="card">
    <b>BEST TIMES</b><br>
    100m: 11.2s | 200m: 24.5s | 400m: 58.2s
  </div>

  <button class="btn" onclick="showScreen('setup')">Start New Run</button>
  <button class="btn" onclick="goToHistory()">View History</button>
  <button class="btn" onclick="switchUser()">Switch User</button>
</div>

<!-- SETUP -->
<div id="setup" class="screen">
  <div class="header">Select Event</div>

  <button class="btn" onclick="startRun(100)">100m</button>
  <button class="btn" onclick="startRun(200)">200m</button>
  <button class="btn" onclick="startRun(400)">400m</button>
  <button class="btn" onclick="startRun(800)">800m</button>
  <button class="btn" onclick="startRun(1600)">1600m</button>

  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<!-- LIVE -->
<div id="live" class="screen">
  <video id="camera" autoplay playsinline muted></video>

  <div class="controls">
    <div id="liveUser" style="
      font-size:16px;
      color:#ff4d4d;
      font-weight:bold;
      margin-bottom:10px;
    ">
      🏃 Runner: Default
    </div>

    <canvas id="speedChart" width="600" height="140" style="
  width:100%;
  background:rgba(0,0,0,0.45);
  border-radius:14px;
  margin-bottom:12px;
"></canvas>

    <div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <div id="liveUser" style="font-size:16px;color:#ff4d4d;font-weight:bold;">
      🏃 Runner: Default
    </div>
    <div id="recordingBadge" style="font-size:13px;font-weight:bold;display:none;">
      <span class="rec-dot"></span>REC
    </div>
  </div>

  <div class="metric-row">
    <div class="metric-box">
      <div class="subtle-label">Time</div>
      <div id="timer" class="metric-value">0.00s</div>
    </div>
    <div class="metric-box">
      <div class="subtle-label">Speed</div>
      <div id="speed" class="metric-value">0 mph</div>
    </div>
  </div>

  <div class="metric-box" style="margin-top:10px;">
    <div class="subtle-label">Split</div>
    <div id="splitDisplay" class="metric-value" style="font-size:18px;">Split: --</div>

    <div class="speedBar">
      <div id="speedFill" class="speedFill"></div>
    </div>
  </div>
</div>

      <div class="speedBar">
        <div id="speedFill" class="speedFill"></div>
      </div>
    </div>

    <button class="btn" onclick="beginMovement()">Start</button>
    <button class="btn" onclick="markSplit()">Split</button>
    <button class="btn" onclick="stopRun()">Finish</button>
    <button class="btn" onclick="resetRun()">Reset</button>
    <button class="btn" onclick="flipCamera()">Flip Camera</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="header">Results</div>
  <div id="resultsUser" style="font-size:16px;color:#ff4d4d;font-weight:bold;"></div>

  <div class="card">
    <p id="finalTime"></p>
    <p id="finalSpeed"></p>
  </div>

  <div class="card" id="splitsBox"></div>

  <button class="btn" onclick="showScreen('home')">Back Home</button>
</div>

<!-- HISTORY -->
<div id="history" class="screen">
  <div class="header">History</div>
  <div class="card" id="historyList"></div>
  <button class="btn" onclick="clearHistory()">Clear History</button>
  <button class="btn" onclick="showScreen('home')">Back</button>
</div>

<script>
let useBackCamera = true;
let chartData = [];
let selectedRunIndex = null;
let mediaRecorder = null;
let recordedChunks = [];
let currentUser = localStorage.getItem("currentUser") || "Default";
let startTime = null;
let timer = null;
let distance = 100;
let splits = [];
let speeds = [];
let isRunning = false;
let currentStream = null;

// USER UI
function updateActiveUserUI(){
  const liveUser = document.getElementById("liveUser");
  const resultsUser = document.getElementById("resultsUser");

  if (liveUser) liveUser.innerText = "🏃 Runner: " + currentUser;
  if (resultsUser) resultsUser.innerText = "🏁 Athlete: " + currentUser;
}

// NAV
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToHistory(){
  showHistory();
  showScreen('history');
}

// SELECT USER
function selectRunner(){

  let name = prompt("Enter runner name:");

  if(!name || name.trim() === ""){
    name = "Runner";
  }

  currentUser = name.trim();
  localStorage.setItem("currentUser", currentUser);

  return currentUser;
}

// START RUN
function startRun(d){

  distance = d;
  splits = [];
  speeds = [];
  isRunning = false;
  startTime = null;

  if(timer) clearInterval(timer);
  timer = null;

  document.getElementById('timer').innerText = "0.00s";
  document.getElementById('speed').innerText = "Speed: 0 mph";
  document.getElementById('splitDisplay').innerText = "Split: --";
  document.getElementById('speedFill').style.width = "0%";

  updateActiveUserUI();
  showScreen('live');
}


// CAMERA
async function startCamera(){
  try{
    if(currentStream){
      currentStream.getTracks().forEach(track => track.stop());
    }

    currentStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: useBackCamera ? "environment" : "user" },
      audio: false
    });

    document.getElementById('camera').srcObject = currentStream;

    recordedChunks = [];

    try {
      if (typeof MediaRecorder !== "undefined") {
        mediaRecorder = new MediaRecorder(currentStream);

        mediaRecorder.ondataavailable = function(e){
          if(e.data.size > 0){
            recordedChunks.push(e.data);
          }
        };

        mediaRecorder.start();
      } else {
        mediaRecorder = null;
      }
    } catch (err) {
      console.warn("Recording failed:", err);
      mediaRecorder = null;
    }

  } catch(err){
    try{
      currentStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
      document.getElementById('camera').srcObject = currentStream;
    } catch(finalErr){
      console.error(finalErr);
      alert("Camera access failed.");
    }
  }
}

// RUN
function beginMovement(){

  if(isRunning) return;

  isRunning = true;

  // 🔥 START CAMERA HERE (USER ACTION)
  startCamera();

  startTime = Date.now();

  if(timer) clearInterval(timer);
  timer = setInterval(update, 100);
}

function update(){
  if(!isRunning || !startTime) return;

  const t = (Date.now() - startTime) / 1000;
  document.getElementById('timer').innerText = t.toFixed(2) + "s";

  const speed = Math.min((distance / Math.max(t, 0.1)) * 2.237, 22);
  speeds.push(speed);

  document.getElementById('speed').innerText = "Speed: " + speed.toFixed(1) + " mph";
  document.getElementById('speedFill').style.width = (speed / 22 * 100) + "%";
}

function markSplit(){
  if(!isRunning || !startTime) return;

  const t = (Date.now() - startTime) / 1000;
  const speed = speeds[speeds.length - 1] || 0;

  splits.push({ time: t, speed: speed });

  document.getElementById('splitDisplay').innerText =
    `Split ${splits.length}: ${t.toFixed(2)}s | ${speed.toFixed(1)} mph`;
}

 function stopRun(){

  if(timer) clearInterval(timer);

  const t = startTime ? (Date.now() - startTime) / 1000 : 0;
  const speed = t > 0 ? (distance / t) * 2.237 : 0;

  document.getElementById('finalTime').innerText = "Time: " + t.toFixed(2) + "s";
  document.getElementById('finalSpeed').innerText = "Speed: " + speed.toFixed(2) + " mph";

  const finishUI = () => {
    showSplits();
    updateActiveUserUI();
    showScreen('results');
  };

  if(mediaRecorder && mediaRecorder.state !== "inactive"){

    mediaRecorder.onstop = function(){

      const blob = new Blob(recordedChunks, { type: "video/webm" });

      const reader = new FileReader();

      reader.onloadend = function(){
        const base64Video = reader.result;
        saveRun(t, speed, base64Video);
        finishUI();
      };

      reader.readAsDataURL(blob);
    };

    mediaRecorder.stop();

  } else {
    saveRun(t, speed, null);
    finishUI();
  }

  isRunning = false;
}

function resetRun(){
  if(timer) clearInterval(timer);
  isRunning = false;
  startTime = null;
  splits = [];
  speeds = [];

  document.getElementById('timer').innerText = "0.00s";
  document.getElementById('speed').innerText = "Speed: 0 mph";
  document.getElementById('splitDisplay').innerText = "Split: --";
  document.getElementById('speedFill').style.width = "0%";
}

// SPLITS
function showSplits(){
  let html = "<b>Splits</b><br>";

  if (splits.length === 0) {
    html += "No splits recorded";
  } else {
    splits.forEach((s,i)=>{
      html += `Split ${i+1}: ${s.time.toFixed(2)}s | ${s.speed.toFixed(1)} mph<br>`;
    });
  }

  document.getElementById('splitsBox').innerHTML = html;
}

function drawSpeedChart(){
  const c = document.getElementById("speedChart");
  if(!c) return;

  const ctx = c.getContext("2d");
  ctx.clearRect(0, 0, c.width, c.height);

  if(chartData.length < 2) return;

  const max = Math.max(...chartData, 1);

  ctx.beginPath();
  ctx.lineWidth = 3;
  ctx.strokeStyle = "#ff3b30";

  chartData.forEach((v, i) => {
    const x = (i / Math.max(chartData.length - 1, 1)) * c.width;
    const y = c.height - (v / max) * (c.height - 10);

    if(i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.stroke();

  splits.forEach((s) => {
    const splitIndex = Math.min(chartData.length - 1, Math.floor((s.time / Math.max((Date.now() - startTime) / 1000, 0.1)) * chartData.length));
    const x = (splitIndex / Math.max(chartData.length - 1, 1)) * c.width;
    ctx.beginPath();
    ctx.strokeStyle = "rgba(255,255,255,0.35)";
    ctx.moveTo(x, 0);
    ctx.lineTo(x, c.height);
    ctx.stroke();
  });
}
  

// HISTORY
function saveRun(time, speed, videoURL){
  const data = JSON.parse(localStorage.getItem("SprintIQUsers") || "{}");

  if(!data[currentUser]) data[currentUser] = [];

  data[currentUser].push({
    distance: distance,
    time: time,
    speed: speed,
    video: videoURL,
    date: new Date().toLocaleString()
  });

  localStorage.setItem("SprintIQUsers", JSON.stringify(data));
}

function showHistory(){

  const data = JSON.parse(localStorage.getItem("SprintIQUsers") || "{}");
  const runs = data[currentUser] || [];

  let html = `<b>${currentUser} History</b><br><br>`;

  if(runs.length === 0){
    html += "No runs yet";
  } else {

    runs.slice().reverse().forEach(r => {

      html += `
        <div style="
          background:#111;
          padding:12px;
          border-radius:12px;
          margin-bottom:15px;
          box-shadow:0 0 10px rgba(255,0,0,.2);
        ">
          <div style="font-size:18px;font-weight:bold;">
            ${r.distance}m - ${Number(r.time).toFixed(2)}s
          </div>

          <div style="color:#aaa;margin-top:4px;">
            ⚡ ${Number(r.speed).toFixed(2)} mph
          </div>

          <div style="font-size:12px;color:#666;margin-top:6px;">
            ${r.date}
          </div>
      `;

      if(r.video){
        html += `
          <video controls class="history-video" playsinline src="${r.video}"></video>
        `;
      }

      html += `</div>`; // ✅ IMPORTANT: inside loop
    });
  }

  document.getElementById("historyList").innerHTML = html;
}


function clearHistory(){
  const data = JSON.parse(localStorage.getItem("SprintIQUsers") || "{}");
  data[currentUser] = [];
  localStorage.setItem("SprintIQUsers", JSON.stringify(data));
  showHistory();
}

function flipCamera(){
  useBackCamera = !useBackCamera;
  startCamera();
}

// SWITCH USER
function switchUser(){
  const name = prompt("Enter athlete name:");
  if(!name) return;
  currentUser = name.trim();
  localStorage.setItem("currentUser", currentUser);
  updateActiveUserUI();
}

// INIT
updateActiveUserUI();
</script>

</body>
</html>
